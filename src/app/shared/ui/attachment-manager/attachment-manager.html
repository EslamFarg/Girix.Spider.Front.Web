<p-dialog
[(visible)]="visible"
(onHide)="closeDialog()"
[modal]="true"
[draggable]="false"
[resizable]="false"
[style]="{ width: '520px' }"
[header]="title">

<div class="space-y-3 max-h-[420px] overflow-y-auto">

    @if(files.length === 0){

    <div class="text-center py-10 text-gray-400">

        <i class="pi pi-folder-open text-5xl"></i>

        <p class="mt-3">
            لا توجد ملفات
        </p>

    </div>

    }

    @for(file of files;track $index){

    <div
    class="flex items-center justify-between
    bg-[#F8FBFC]
    border border-[#D7EAF3]
    rounded-lg
    px-4
    py-3
    hover:bg-[#EEF8FC]
    transition">

        <div class="flex items-center gap-3">

            <div
            class="w-11 h-11
            rounded-lg
            bg-[#E7F5FB]
            flex
            items-center
            justify-center">

                <i
                class="fa-solid text-[#106388] text-xl"
                [ngClass]="getFileIcon(file)">
                </i>

            </div>

            <div>

                <p class="font-medium text-[#2C3E50]">

                    {{file.name}}

                </p>

                <span class="text-xs text-gray-500">

                    {{formatFileSize(file.size)}}

                </span>

            </div>

        </div>

        <div class="flex items-center gap-1">

            <button
            type="button"
            (click)="onPreview(file)"
            class="w-8 h-8 rounded-full hover:bg-sky-100">

                <i class="fa-regular fa-eye text-primary"></i>

            </button>

            @if(!readonly){

            <button
            type="button"
            (click)="onDelete($index)"
            class="w-8 h-8 rounded-full hover:bg-red-50">

                <i class="fa-solid fa-xmark text-red-500"></i>

            </button>

            }

        </div>

    </div>

    }

</div>

<ng-template pTemplate="footer">

    <button
    class="btn btn-primary"
    (click)="closeDialog()">

        إغلاق

    </button>

</ng-template>

</p-dialog>
