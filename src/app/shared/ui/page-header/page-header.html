<div class="flex justify-between flex-wrap mb-[25px]  top-[60px] pt-[10px] z-[18] mt-[10px] bg-[var(--color-bg)] z-1">
    <div>
        
        <h2 class="text-[var(--color-primary)] text-[20px] font-[700]">{{titleHeader()}}</h2>
      <div class="flex items-center flex-wrap gap-3 my-4">
                @for(btn of actions(); track $index) {
                    <button class="btn" (click)="onActionClicked(btn.action)" [ngClass]="btn.type">{{btn.label}}</button>
                }
        </div>
    </div>

    @if(explorerBtn()){

        <div class="explorer_button">
         <button [routerLink]="explorerBtn()?.link" class="btn btn-primary" style="width:245px !important;">{{explorerBtn()?.label}} </button>
     
        </div>
    }
    
</div>
