      <div class="grid grid-cols-1 md:grid-cols-12 gap-[24px] gap-y-[10px]">
        <!-- <div class="col-span-6">
          <label for="fromDate">المرجع</label>
          <input type="text" placeholder="المرجع" />
        </div>
        <div class="col-span-6">
          <label for="fromDate">المورد</label>
          <input type="text" placeholder="المورد" />
        </div>
        <div class="col-span-12">
          <label for="fromDate">رقم الجوال</label>
          <input type="text" placeholder="رقم الجوال" />
        </div> -->
        @for(item of filteringData();track $index){
            <div [class]="item.class">
                <label [for]="$index + 1">{{item.label}}</label>
                @if (item.type === 'date') {
                  <p-datepicker
                    appendTo="body"
                    [iconDisplay]="'input'"
                    [placeholder]="item.placeholder"
                    [showIcon]="true"
                    [inputId]="'field-' + $index"
                    [showOnFocus]="false"
                    [name]="'field' + $index"
                    [(ngModel)]="item.value"
                    (ngModelChange)="onFieldInput(item)"
                  />
                } @else {
                  <input
                    [type]="item.type"
                    [name]="'field' + $index"
                    [id]="$index + 1"
                    [placeholder]="item.placeholder"
                    [(ngModel)]="item.value"
                    (input)="onFieldInput(item)"
                    (keydown.enter)="search()"
                  />


@if(item.error){
  <small class="text-red-500 font-bold mx-3 mt-2 block text-xs mt-1" >
    {{ item.error }}
  </small>
}
                }
            </div>
        }
      </div>

      <div class="mt-5 block text-end">
        <p-button label="بحث"   (click)="search()" />
      </div>
    </form>
  </p-dialog>
