 <div class=acco>
<div class="main">

  <!-- loop على الأقسام -->
  <div *ngFor="let section of sidebarSections">

    <!-- عنوان القسم -->
    <p class="title text-[var(--color-gray)] text-[14px] font-[700] opacity-90">
      {{ section.title }}
    </p>

    <!-- العناصر داخل القسم -->
    <div *ngFor="let item of section.items" class="my-2">

      <!-- item -->
      <div
       [routerLink]="item?.link"
        class="flex items-center gap-2 px-2 py-3 rounded-[12px] cursor-pointer"
        [ngStyle]="{
          'background-color': item?.isOpen ? 'var(--color-active)' : ''
        }"
        (click)="openItems(item)"
      >
        <span class="icon block" [innerHTML]="item.icon" class="[&>svg>*]:stroke-[var(--color-gray)]"></span>

        <button
         
          class="text-[14px] font-[700] text-[var(--color-primary)]"
        >
          <h5>{{ item.label }}</h5>
        </button>
      </div>

      <!-- sub menu -->
      <div
        [ngClass]="{
          'max-h-[500px] opacity-100': item.isOpen
        }"
        class="pl-4 text-[var(--color-gray)] max-h-0 opacity-0 transition-all duration-300 overflow-hidden content-sidebar"
      >

        <div *ngFor="let content of item?.content">
          <div class="line"></div>

          <div>
            <a
              
              [routerLink]="content?.link || item.link"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: false }"
              class="pr-[10px]"
            >
              {{ content.label }}
            </a>
          </div>
        </div>

      </div>

    </div>
  </div>

</div>
