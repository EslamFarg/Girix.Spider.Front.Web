<main
  [class.pointer-events-none]="isLoading()"
  [class.opacity-90]="isLoading()"
  class="flex justify-center items-center sm:p-4 bg-[#121212] auth-layout-main"
>
  <router-outlet />
</main>
<p-progress-spinner
  [class]="
    `fixed! left-1/2! -z-100 top-1/2! -translate-x-1/2! -translate-y-1/2! opacity-0 transition-all ${isLoading() ? ' z-100 opacity-100 ' : ' opacity-0 -z-100'} `
  "
  ariaLabel="loading"
/>
