  <form
  [formGroup]="authForm"
  (ngSubmit)="onSubmit()"
    class="p-[32px] bg-[#fff] z-[1000] md:w-[600px] min-h-[515px] rounded-xl absolute right-[50%] sm:w-[95%] top-[50%] translate-x-[50%] translate-y-[-50%]"
  >
    <h2 class="title text-[#090909] text-[24px] font-[700]">تسجيل الدخول</h2>
    <p class="text-[#B1B5B8] font-[500] text-[18px] my-2">سجل الدخول للإدارة اعمالك هنا</p>

    <div class="input my-4">
      <label for="year">السنة المالية</label>
      <div class="relative">
        <select
          class="w-full px-2 font-bold text-[#fff] border border-[var(--color-border)] rounded-[8px] h-[50px] appearance-none text-[14px]"
          placeholder=""
          style="color: #000 !important;  height: 40px !important; font-size:16;"
          formControlName="fiscalYearId"
        >
          <option value=""  disabled class="text-[#A2A4C8] ">اختر السنة المالية</option>
          <!-- <option [value]="currentYear" selected>{{currentYear}}</option> -->
           @for(year of years;track $index){
            <option [value]="year" >{{year}}</option>
           }
        </select>
        
        <!-- الأيقونة -->
        <span class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
          <i class="fa-solid fa-angle-down text-[#414244]"></i>
        </span>
      </div>
      <app-form-error [control]="authForm.controls['fiscalYearId']" [errorKey]="'required'" [message]="'السنة المالية مطلوبة'"></app-form-error>
    </div>
    <div class="input my-4">
      <label for="userName">اسم المستخدم / البريد الالكتروني</label>
      <input type="text" id="userName" placeholder="  ادخل اسم المستخدم / البريد الالكتروني "  formControlName="emailOrUsername"/>
       <app-form-error [control]="authForm.controls['emailOrUsername']" [errorKey]="'required'" [message]="'اسم المستخدم  او البريد الالكتروني مطلوب'"></app-form-error>
        <app-form-error
    [control]="authForm.controls['emailOrUsername']"
    [errorKey]="'invalidEmail'"
    [message]="'البريد الإلكتروني غير صحيح'">
  </app-form-error>
    </div>
    <div class="input my-4">
      <label for="password">كلمة المرور</label>
      <div class="relative">
        <input
          [type]="isShowPassword ? 'text' : 'password'"
          id="password"
          placeholder="أدخل كلمة المرور"
          formControlName="password"
          maxlength="20"
        />
        <div
          class="icon_change_password absolute cursor-pointer left-[10px] top-[55%] translate-y-[-50%]"
          (click)="this.isShowPassword = !this.isShowPassword"
        >
          @if (this.isShowPassword == false) {
            <i class="fa-regular fa-eye text-[18px]"></i>
          } @else {
            <i class="fa-regular fa-eye-slash text-[18px]"></i>
          }
        </div>
      </div>
      <app-form-error [control]="authForm.controls['password']" [errorKey]="'required'" [message]="'كلمة المرور مطلوبة'"></app-form-error>
      <app-form-error [control]="authForm.controls['password']" [errorKey]="'minlength'" [message]="' كلمة المرور  يجب ان تكون اكبر من 8 حروف'"></app-form-error>
      <app-form-error [control]="authForm.controls['password']" [errorKey]="'maxlength'" [message]="' كلمة المرور  يجب ان تكون ان لاتزيد من 20 حرف'"></app-form-error>
    </div>
    <div class="input my-4 flex items-center gap-[10px]">
      <input type="checkbox" id="notification" placeholder="تذكرني"
      formControlName="rememberMe"
      />
      <label
        
        for="notification"
        style="margin-bottom: 0px !important; color: #5f6063; font-size: 14px; font-weight: 600"
        >تذكرني</label
      >
    </div>

    <div class="w-[100%]">
      <button
        type="submit"
        class="w-[100%] h-[56px] bg-[var(--color-btn)] text-[#fff] rounded-[8px] cursor-pointer"
      >
        تسجيل الدخول
      </button>
    </div>
  </form>

  <div class="logo">
    <img src="/images/logo.png" alt="logo" srcset="" />
  </div>
</div>
