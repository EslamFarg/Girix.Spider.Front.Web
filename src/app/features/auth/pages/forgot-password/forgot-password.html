<div class="flex items-center justify-center h-screen">
  <section class="flex flex-col gap-4 p-10 w-120">
    <div class="text-center">
      <a routerLink="/auth/login" class="text-app-blue text-sm underline cursor-pointer">الرجوع</a>
      <h1 class="text-xl text-text-light font-bold select-none mt-2">الرجاء ادخل البريد الالكتروني</h1>
    </div>
    <p class="text-text-light text-sm text-center max-w-80 mx-auto leading-relaxed">
      يجب ادخال البريد الالكتروني المسجل في النظام لارسال الكود الخاص بك.
    </p>
    <form class="flex w-full flex-col mt-4 gap-4" [formGroup]="fg" (ngSubmit)="onSubmit()">
      <app-input-error-message-handler [fc]="fg.get('email')">
        <input
          pInputText
          formControlName="email"
          type="email"
          id="email"
          class="app-input h-12! "
          placeholder="البريد الالكتروني "
        />
      </app-input-error-message-handler>
      <p-button
        type="submit"
        label="استمرار"
        class=" w-full max-w-44 mx-auto"
        styleClass="w-full border-dark-bg-1! bg-dark-line!  cursor-pointer ! rounded py-2.5 mt-4 text-white!"
      />
    </form>
  </section>
</div>
