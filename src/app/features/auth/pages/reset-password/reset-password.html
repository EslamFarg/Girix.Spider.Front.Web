<div class="flex items-center justify-center h-screen">
  <section class="flex flex-col gap-6 p-10 w-120">
    <h1 class="text-xl font-bold text-center select-none"> ادخل كلمه المرور الجديدة</h1>
    <p class="text-text-light text-sm text-center max-w-80 mx-auto leading-relaxed">يجب أن تكون كلمة المرور الجديدة الخاصة بك فريدة من نوعها مقارنة بكلمات المرور التي استخدمتها سابقًا.</p>
    <form class="flex flex-col gap-4" [formGroup]="fg" (ngSubmit)="onSubmit()">
      <app-input-error-message-handler>
        <p-password
          class="app-input h-12! [&>input]:h-12!"
          placeholder="كلمة المرور الجديدة"
          [toggleMask]="true"
        />
      </app-input-error-message-handler>
      <app-input-error-message-handler>
        <p-password
          class="app-input h-12! [&>input]:h-12!"
          placeholder="تاكيد كلمة المرور الجديدة"
          [toggleMask]="true"
          [feedback]="false"
        />
      </app-input-error-message-handler>
      <div class="flex items-center gap-2">
        <input type="checkbox" class="cursor-pointer" id="rememberMe" />
        <label for="rememberMe" class="cursor-pointer">تذكرني</label>
        <a routerLink="/auth/forgot-password" class="text-app-blue ms-auto text-sm cursor-pointer">هل نسيت كلمة المرور ؟ </a>
      </div>
      <p-button
        type="submit"
        label="دخول"
        class="w-full max-w-44 mx-auto"
        styleClass="w-full border-dark-bg-1! bg-dark-line!  cursor-pointer ! rounded py-2.5 mt-4 text-white!"
      />
    </form>
  </section>
</div>
