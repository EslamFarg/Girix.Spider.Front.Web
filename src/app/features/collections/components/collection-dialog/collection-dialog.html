<p-dialog
  [visible]="isCollectionInvoiceDialogVisible()"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '100%', maxWidth: '800px' }"
  [attr.style]="'--p-mask-background:#1f1d2be5!important;'"
  styleClass="bg-white!"
  contentStyleClass=" custom-scroll"
  class="addition-dialog"
  (onHide)="closeCollectionInvoiceDialog()"
>
  <ng-template #header>
    <div class="inline-flex items-center justify-center gap-2 flex-1 ps-10 text-xl font-bold text-dark-bg-2">
      التحصيل
    </div>
  </ng-template>
  @if (isDeliveryDialog()) {
    <section class="border border-text-gray p-2 rounded-lg flex flex-col gap-4">
      @for (item of currentDeliveryOrders(); track $index) {
        <div class="flex w-full gap-1 items-center font-bold text-text-dark text-sm">
          <input (change)="checkOrder($event, item.orderId)" class="w-4 h-4" type="checkbox" name="" id="" />
          <div class="flex items-center gap-2">
            <span>رقم الفاتوره </span>
            <span>{{ item.orderNumber }}</span>
          </div>
          <div class="ms-auto flex items-center gap-2">
            <span>سعر الفاتوره:</span>
            <span>{{ item.netOrder.toFixed(2) }}</span>
          </div>
        </div>
      }
    </section>
  } @else {
    <app-printable-order-invoice [data]="currentBill()"  class="[&_.paid-cash,&_.paid-network]:hidden"/>
  }

  <form [formGroup]="paymentFg" class="flex flex-col gap-4 py-4">
    <div class="grid grid-cols-2 gap-4">
      <!-- cash -->
      <div>
        <label for="cashPaymentAmount">{{ 'FORM.CASH_PAID' | translate }}</label>
        <app-input-error-message-handler [fc]="paymentFg.get('cashPaymentAmount')">
          <input
            pInputText
            aria-describedby="cash-help"
            [placeholder]="'FORM.CASH' | translate"
            [formControl]="getFormControl(paymentFg, 'cashPaymentAmount')"
            appAllowNumbers
            [max]="net()"
            appDecimalMask
            [min]="0"
            [allowDecimal]="true"
            #cashPaymentAmount
            id="cashPaymentAmount"
            appDebounce
            class="app-input"
            (click)="triggerNumbersKeyboard(cashPaymentAmount)"
          />
          <p-inputgroup-addon class="flex p-0!">
              <button
                pButton
                class="app-p-btn p-0! h-full px-3! rounded-e-lg!"
                type="button"
                (click)="paymentFg.controls.cashPaymentAmount.setValue(0)"
              >
                <i class="pi pi-arrow-down"></i>
              </button>
            </p-inputgroup-addon>
        </app-input-error-message-handler>
      </div>

      <!-- cash account -->
      <div>
        <label>{{ 'FORM.ACCOUNT_NAME' | translate }}</label>
        <app-input-error-message-handler [fc]="paymentFg.get('cashAccountId')">
          <ng-select
            class="app-select w-full"
            [items]="displayedCashAccounts()"
            [formControl]="getFormControl(paymentFg, 'cashAccountId')"
            bindLabel="name"
            bindValue="id"
            [clearable]="false"
            placeholder="الكل"
            #cashAccountSelect
            appDebounce
            [customEvents]="[
              { type: 'searchEvent', value: cashAccountSelect.searchEvent },
              { type: 'scrollToEnd', value: cashAccountSelect.scrollToEnd },
            ]"
            (debounced)="onCashFinancialAccountsSearch($event)"
          />
        </app-input-error-message-handler>
      </div>

      <!-- network -->
      <div>
        <label for="networkPaymentAmount">{{ 'FORM.NETWORK_PAID' | translate }}</label>
        <app-input-error-message-handler [fc]="paymentFg.get('networkPaymentAmount')">
          <input
            pInputText
            appAllowNumbers
            [allowDecimal]="true"
            [max]="net()"
            [min]="0"
            id="networkPaymentAmount"
            aria-describedby="network-help"
            #networkPaymentAmount
            (click)="triggerNumbersKeyboard(networkPaymentAmount)"
            [formControl]="getFormControl(paymentFg, 'networkPaymentAmount')"
            [placeholder]="'FORM.NETWORK' | translate"
            class="app-input"
          />
          <p-inputgroup-addon class="flex p-0!">
              <button
                pButton
                class="app-p-btn p-0! h-full px-3! rounded-e-lg!"
                type="button"
                (click)="paymentFg.controls.networkPaymentAmount.setValue(0)"
              >
                <i class="pi pi-arrow-up"></i>
              </button>
            </p-inputgroup-addon>
        </app-input-error-message-handler>
      </div>

      <!-- network account -->
      <div>
        <label>{{ 'FORM.ACCOUNT_NAME' | translate }}</label>
        <app-input-error-message-handler [fc]="paymentFg.get('networkAccountId')">
          <ng-select
            class="app-select w-full"
            [items]="displayedNetworkAccounts()"
            [formControl]="getFormControl(paymentFg, 'networkAccountId')"
            bindLabel="name"
            bindValue="id"
            [clearable]="false"
            placeholder="الكل"
            #networkAccountSelect
            appDebounce
            [customEvents]="[
              { type: 'searchEvent', value: networkAccountSelect.searchEvent },
              { type: 'scrollToEnd', value: networkAccountSelect.scrollToEnd },
            ]"
            (debounced)="onNetworkFinancialAccountsSearch($event)"
          />
        </app-input-error-message-handler>
      </div>
    </div>

    <!-- number keyboard toggle -->
    <div class="flex justify-end">
      <button
        type="button"
        pButton
        class="cursor-pointer"
        styleClass="px-3! py-1!"
        severity="secondary"
        variant="outlined"
        (click)="toggleNumbersKeyboard()"
        title="لوحة المفاتيح"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6H20M4 10H20M4 14H16M4 18H12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    @if (isNumbersKeyboardVisible()) {
      <app-numbers-keyboard />
    }
  </form>
  <ng-template #footer>
    <div class="flex justify-center items-center gap-2 w-full *:px-8! *:py-0.75! *:text-sm! *:font-bold">
      <button appLoadingDisabled pButton severity="secondary" class="bg-dark-bg-2" (click)="onSubmitCollection()">
        {{ 'ACTIONS.SAVE' | translate }}
      </button>
      <button appLoadingDisabled pButton severity="secondary" (click)="closeCollectionInvoiceDialog()">
        {{ 'ACTIONS.CANCEL' | translate }}
      </button>
    </div>
  </ng-template>
</p-dialog>
