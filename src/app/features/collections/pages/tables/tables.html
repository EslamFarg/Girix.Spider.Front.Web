<app-section-wrapper class="block mt-4 p-4 overflow-auto custom-scroll h-full" styleClass="no-scrollbar">
  <!-- search -->
  <form appLoadingDisabled #form [formGroup]="searchFg" (ngSubmit)="onSearchSubmit()">
    <app-input-error-message-handler [fc]="searchFg.get('searchTerm')">
      <input class="w-full bg-transparent! h-8!" pInputText type="text" formControlName="searchTerm" placeholder="بحث" />
      <p-inputgroup-addon class="p-0!">
        <button type="submit" class="flex cursor-pointer" pTooltip="بحث">
            <i class="pi pi-search"></i>
          </button>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>

  <!-- items grid -->
  <div class="table-switch-grid my-4 mt-8">
    @for (table of tables(); track $index) {
      <app-table-card
        class="table-switch-card"
        (click)="openCollectionDialog({
          orderId: table.orderId,
          isCollected: table.isAvailable
        })"
        [data]="table"
      />
    }
  </div>

    (onPageChange)="onPageChange($event)"
    [first]="getCurrentRowsIx(1 , 18)"
    [showFirstLastIcon]="false"
    [rows]="18"
    [totalRecords]="tablesPaginationInfo().totalRowsCount"
  /> -->
</app-section-wrapper>
