<app-section-wrapper class="block p-4 overflow-auto custom-scroll">
  <!-- search -->
  <form
    #form
    [formGroup]="fg"
    appLoadingDisabled
    appDebounce
    [domEvents]="['submit']"
    (debounced)="onSearchSubmit()"
    class="flex h-fit items-start gap-2 w-full"
  >
    <div class="flex-1">
      <app-input-error-message-handler [fc]="fg.get('searchTerm')">
        <input
          class="w-full bg-transparent!"
          pInputText
          type="text"
          formControlName="searchTerm"
          [placeholder]="'ACTIONS.SEARCH' | translate"
        />
        <!-- <p-inputgroup-addon>
            <i class="pi pi-filter"></i>
          </p-inputgroup-addon> -->
        <p-inputgroup-addon>
          <button type="submit" class="flex cursor-pointer"><i class="pi pi-search"></i></button>
        </p-inputgroup-addon>
      </app-input-error-message-handler>
    </div>

    <p-select
      [options]="filterOptions"
      formControlName="searchEnum"
      optionLabel="label"
      optionValue="value"
      [placeholder]="'actions.all' | translate"
      class="h-fit hidden! sm:flex! w-40"
    />
  </form>

  <!-- items grid -->
  <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-8 my-4 mt-8">
    @for (item of customers(); track $index) {
      <div
        style="backdrop-filter: blur(20px); box-shadow: 0px 0px 27.14px 0px #6a6a6acc inset"
        class="flex border-2 relative cursor-pointer border-[#393C49] aspect-[1.84] available items-center justify-center bg-white rounded-[14px]"
        [class.replacements-reserved]="item.orderNumbers > 0"
        (click)="
          openCollectionDialog({
            deliveryId: item.id,
            orderType: OrderLocationType.PersonDelivery,
            isCollected: item.orderNumbers == 0,
          })
        "
      >
        @if (item.orderNumbers > 0) {
          <div
            class="absolute -top-3.5 -right-0.5 w-[23px] aspect-square flex items-center justify-center text-base font-bold bg-dark-line text-[#FA8D7B] rounded-full"
          >
            <span>{{ item.orderNumbers }}</span>
          </div>
        }
        <span
          class="text-black font-bold mx-auto min-w-[95%] w-[95%] text-center text-ellipsis overflow-hidden whitespace-nowrap"
          >{{ item.name }}</span
        >
      </div>
    }
  </div>

  <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="(customersPaginationInfo.pageIndex - 1) * 10"
    [rows]="10"
    [totalRecords]="customersPaginationInfo.totalRowsCount"
  />
</app-section-wrapper>
