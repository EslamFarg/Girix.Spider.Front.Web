<app-section-wrapper class="block mt-4 p-4 overflow-auto custom-scroll">
  <!-- search -->
  <form appLoadingDisabled #form [formGroup]="searchFg" (ngSubmit)="onSearchSubmit()">
    <app-input-error-message-handler [fc]="searchFg.get('searchTerm')">
      <input
        class="w-full bg-transparent! h-8!"
        pInputText
        type="text"
        formControlName="searchTerm"
        placeholder="بحث"
      />
      <p-inputgroup-addon class="p-0!">
        <button type="submit" class="flex cursor-pointer" pTooltip="بحث">
            <i class="pi pi-search"></i>
          </button>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>

  <!-- items grid -->
  <div
    class="grid gap-4 sm:grid-cols-3 sm:gap-[1rem_2rem] md:grid-cols-4 md:gap-[2rem_4rem] lg:grid-cols-5 lg:gap-[3rem_6rem] xl:grid-cols-6 xl:gap-[4rem_7rem] my-4 mt-8"
    style="row-gap: 4rem; column-gap: 7rem"
  >
    @for (room of rooms(); track $index) {
      <app-room-card
        (click)="
          openCollectionDialog({
            orderId: room.orderId,
            isCollected: room.isAvailable,
          })
        "
        [data]="room"
      />
    }
  </div>

  <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="getCurrentRowsIx(1)"
    [showFirstLastIcon]="false"
    [rows]="10"
    [totalRecords]="roomsPaginationInfo().totalRowsCount"
  />
</app-section-wrapper>
