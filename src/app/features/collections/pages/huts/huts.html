<app-section-wrapper class="block p-4 md:pt-8 overflow-auto custom-scroll h-full" styleClass="no-scrollbar">
  <!-- search -->
  <form #form appLoadingDisabled [formGroup]="searchFg" (ngSubmit)="onSearchSubmit()">
    <app-input-error-message-handler [fc]="searchFg.get('searchTerm')">
      <input
        class="w-full bg-transparent! h-8!"
        pInputText
        type="text"
        formControlName="searchTerm"
        placeholder="بحث"
      />
      <p-inputgroup-addon class="p-0!">
        <button type="submit" class="flex cursor-pointer" pTooltip="بحث">
            <i class="pi pi-search"></i>
          </button>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>
  
  <!-- items grid -->
  <div class="hut-switch-grid">
    @for (hut of huts(); track $index) {
      <app-hut-card
        class="hut-switch-card"
        (click)="
          openCollectionDialog({
            orderId: hut.orderId,
            isCollected: hut.isAvailable,
          })
        "
        [data]="hut"
      />
    }
  </div>

    (onPageChange)="onPageChange($event)"
    [first]="getCurrentRowsIx(1)"

    [rows]="10"
    [totalRecords]="hutsPaginationInfo().totalRowsCount"
  /> -->
</app-section-wrapper>
