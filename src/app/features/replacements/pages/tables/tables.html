<app-section-wrapper class="block p-4 pt-8 overflow-auto no-scrollbar h-full" styleClass="no-scrollbar">
  <!-- search -->
  <form appLoadingDisabled appDebounce
    [domEvents]="['submit']" #form [formGroup]="searchFg" (ngSubmit)="onSearchSubmit()">
    <app-input-error-message-handler [fc]="searchFg.get('searchTerm')">
      <input
        class="w-full bg-transparent! h-8!"
        pInputText
        type="text"
        formControlName="searchTerm"
        placeholder="بحث"
      />
      <p-inputgroup-addon class="p-0!">
        <button type="submit" class="flex cursor-pointer" pTooltip="بحث">
            <i class="pi pi-search"></i>
          </button>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>

  <!-- items grid -->
  <div class="table-switch-grid my-4 mt-8">
    @for (item of tables(); track $index) {
      <app-table-card class="table-switch-card" (click)="openDialog({ data: item, localSpaceType: localSpaceTypeEnum.Table })" [data]="item" />
    }
  </div>

  <!-- <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="getCurrentRowsIx(tablesPaginationInfo.pageIndex , 16)"
    [showFirstLastIcon]="false"
    [rows]="16"
    [totalRecords]="tablesPaginationInfo.totalRowsCount"
  /> -->
</app-section-wrapper>
