<app-section-wrapper class="block p-4 pt-8 overflow-auto no-scrollbar h-full" styleClass="no-scrollbar">
  <!-- search -->
  <form #form [formGroup]="searchFg" (ngSubmit)="onSearchSubmit()">
    <app-input-error-message-handler [fc]="searchFg.get('searchTerm')">
      <input
        class="w-full bg-transparent! h-8!"
        pInputText
        type="text"
        formControlName="searchTerm"
        placeholder="بحث"
      />
      <p-inputgroup-addon class="p-0!">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M10.4154 17.5C6.04311 17.5 2.4987 13.9555 2.4987 9.58329C2.4987 5.21104 6.04311 1.66663 10.4154 1.66663C14.7876 1.66663 18.332 5.21104 18.332 9.58329C18.332 13.9555 14.7876 17.5 10.4154 17.5Z"
            stroke="#7F7F7F"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M1.66536 18.3333L3.33203 16.6666"
            stroke="#7F7F7F"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>

  <!-- items grid -->
  <div
    class="grid grid-cols-2 gap-6 sm:grid-cols-3 sm:gap-7 md:grid-cols-4 md:gap-9 xl:grid-cols-6 xl:gap-[4rem_7rem] my-4 mt-8"
  >
    @for (item of tables(); track $index) {
      <app-table-card (click)="openDialog({ data: item, localSpaceType: localSpaceTypeEnum.Table })" [data]="item" />
    }
  </div>

  <p-paginator
    (onPageChange)="onPageChange($event)"
    [first]="getCurrentRowsIx(tablesPaginationInfo.pageIndex)"
    [showFirstLastIcon]="false"
    [rows]="10"
    [totalRecords]="tablesPaginationInfo.totalRowsCount"
  />
</app-section-wrapper>
