<app-section-wrapper class="block p-4 md:pt-8 overflow-auto custom-scroll h-full" styleClass="no-scrollbar">
  <!-- search -->
  <form appLoadingDisabled #form [formGroup]="searchFg" (ngSubmit)="onSearchSubmit()">
    <app-input-error-message-handler [fc]="searchFg.get('searchTerm')">
      <input
        class="w-full bg-transparent! h-8!"
        pInputText
        type="text"
        maxlength="100"
        formControlName="searchTerm"
        placeholder="بحث"
      />
      <p-inputgroup-addon class="p-0!">
        <button type="submit" class="flex cursor-pointer" pTooltip="بحث">
        <svg
          (click)="onSearchSubmit()"
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10.4154 17.5C6.04311 17.5 2.4987 13.9555 2.4987 9.58329C2.4987 5.21104 6.04311 1.66663 10.4154 1.66663C14.7876 1.66663 18.332 5.21104 18.332 9.58329C18.332 13.9555 14.7876 17.5 10.4154 17.5Z"
            stroke="#7F7F7F"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M1.66536 18.3333L3.33203 16.6666"
            stroke="#7F7F7F"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        </button>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>

  <!-- items grid -->
  <div
    class="grid grid-cols-2 gap-[8rem_2rem] sm:grid-cols-3  md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 my-4"
  >
    @for (item of huts(); track item.id) {
      <app-hut-card
        (click)="openDialog({ data: item, localSpaceType: localSpaceTypeEnum.Hut })"
        class="self-end"
        [class.mt-[50%]]="$first"
        [data]="item"
      />
    }
  </div>

  <!-- <p-paginator
    (onPageChange)="onPageChange($event)"
    [showFirstLastIcon]="false"
    [first]="getCurrentRowsIx(hutsPaginationInfo.pageIndex)"
    [rows]="12"
    [totalRecords]="hutsPaginationInfo.totalRowsCount"
  /> -->
</app-section-wrapper>
