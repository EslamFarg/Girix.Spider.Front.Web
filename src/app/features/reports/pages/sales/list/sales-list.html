<app-section-wrapper>
    <form [formGroup]="fg" (ngSubmit)="onSubmit()" appLoadingDisabled class="no-print flex flex-wrap items-end gap-2 w-full mb-4">
        <div class="flex flex-col gap-1">
            <label class="text-xs text-text-gray">من تاريخ</label>
            <input pInputText type="date" formControlName="fromDate" class="bg-transparent!" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-text-gray">إلى تاريخ</label>
            <input pInputText type="date" formControlName="toDate" class="bg-transparent!" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-text-gray">بحث</label>
            <input pInputText type="text" formControlName="searchTerm" placeholder="اسم العميل أو رقم الفاتورة..." class="bg-transparent!" />
        </div>
        <div class="flex gap-2 ms-auto">
            <button type="submit" class="flex items-center gap-1 cursor-pointer" pTooltip="بحث">
                <i class="pi pi-search"></i>
            </button>
            <button type="button" class="flex items-center gap-1 cursor-pointer" pTooltip="إعادة تعيين" (click)="fg.reset(); onSubmit()">
                <i class="pi pi-refresh"></i>
            </button>
        </div>
    </form>

    <app-report-print-view
        title="تقرير المبيعات"
        [columns]="columns"
        [rows]="rows()"
        [filters]="lastSearchFilters()"
        [paginationInfo]="paginationInfo"
        [isLoading]="isLoading()"
        (pageChange)="onPageChange($event)"
    />
</app-section-wrapper>
