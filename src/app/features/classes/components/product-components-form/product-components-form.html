<!-- product selector + save -->
<div
  class="w-full overflow-auto custom-scroll flex items-center justify-between gap-2"
  style="--p-button-primary-background: transparent"
>
  <!-- Product selector -->
  <div class="flex-1 max-w-xs">
    <app-input-error-message-handler class="flex-1" [grouped]="false" [fc]="fg.controls.menuItemId">
      <ng-select
        class="app-select"
        [items]="displayedProducts()"
        bindLabel="name"
        [formControl]="fg.controls.menuItemId"
        bindValue="id"
        placeholder="اختر الصنف"
        [clearable]="false"
        #mainProduct
        appDebounce
        [customEvents]="[
          { type: 'searchEvent', value: mainProduct.searchEvent },
          { type: 'scrollToEnd', value: mainProduct.scrollToEnd },
        ]"
        (debounced)="debouncedProductsSearch($event, mainProduct.searchTerm)"
      />
    </app-input-error-message-handler>
  </div>

  <button appLoadingDisabled pButton class="app-p-btn md:py-1! md:px-8!" form="productComponentsForm" type="submit">
    {{ 'ACTIONS.SAVE' | translate }}
  </button>
</div>

<form [formGroup]="fg" id="productComponentsForm" (ngSubmit)="onSubmitForm()">

  <!-- Components table -->
  <div class="mt-3 overflow-visible">
    <table class="w-full main-table pc-table">
      <thead>
        <tr>
          <th class="pc-col-index">#</th>
          <th class="pc-col-component">المكون</th>
          <th class="pc-col-unit">الوحدة</th>
          <th class="pc-col-qty">الكمية</th>
          <th class="pc-col-price">السعر</th>
          <th class="pc-col-actions">الأدوات</th>
        </tr>
      </thead>
      <tbody>

        <!-- ── Add row ──────────────────────────────────────────────── -->
        <tr
          [class.last-clicked-table-row]="lastClickedTableRowIndex() === null"
          (click)="lastClickedTableRowIndex.set(null)"
          class="*:overflow-visible!"
        >
          <!-- # placeholder -->
          <td class="pc-add-label text-center">#</td>

          <!-- component -->
          <td>
            <app-input-error-message-handler
              class="flex-1"
              [grouped]="false"
              [fc]="newProductComponentRowFg.controls.componentId"
            >
              <ng-select
                class="app-select"
                [items]="displayedProducts()"
                bindLabel="name"
                [formControl]="newProductComponentRowFg.controls.componentId"
                (change)="onNewProductComponentChange($event)"
                bindValue="id"
                placeholder="اختر المكون"
                [clearable]="false"
                appendTo="body"
                appDebounce
                [customEvents]="[
                  { type: 'searchEvent', value: newProductComponentRowProduct.searchEvent },
                  { type: 'scrollToEnd', value: newProductComponentRowProduct.scrollToEnd },
                ]"
                (debounced)="debouncedProductsSearch($event, newProductComponentRowProduct.searchTerm)"
                #newProductComponentRowProduct
              />
            </app-input-error-message-handler>
          </td>

          <!-- unit -->
          <td>
            <app-input-error-message-handler
              class="flex-1"
              [grouped]="false"
              [fc]="newProductComponentRowFg.controls.unitId"
            >
              <ng-select
                class="app-select"
                [items]="newProductComponentRowFg.controls.units.value"
                bindLabel="unitName"
                [formControl]="newProductComponentRowFg.controls.unitId"
                bindValue="unitId"
                placeholder="الوحدة"
                appendTo="body"
                [clearable]="false"
              />
            </app-input-error-message-handler>
          </td>

          <!-- quantity -->
          <td>
            <app-input-error-message-handler [fc]="newProductComponentRowFg.controls.quantity">
              <input
                pInputText
                type="number"
                appAllowNumbers
                [allowDecimal]="true"
                [min]="1"
                [formControl]="newProductComponentRowFg.controls.quantity"
                class="app-input text-center no-input-spinner"
                placeholder="1"
              />
            </app-input-error-message-handler>
          </td>

          <!-- price (display-only, calculated) -->
          <td>
            <div class="pc-price-cell">
              {{ (+(newProductComponentRowFg?.value?.quantity ?? 0) * getUnitPrice(-1))?.toFixed(2) }}
            </div>
          </td>

          <!-- add action -->
          <td>
            <button
              (click)="addProductComponentRow()"
              type="button"
              pButton
              class="pc-btn-add border-dark-line! bg-dark-line! text-sm! text-white!"
            >
              {{ 'ACTIONS.ADD' | translate }}
            </button>
          </td>
        </tr>

        <!-- ── Existing rows (always inline-editable) ──────────────── -->
        @for (item of componentsRows.controls; track $index) {
          <tr
            [class.last-clicked-table-row]="lastClickedTableRowIndex() === $index"
            (click)="lastClickedTableRowIndex.set($index)"
            [style]="`--ix:${$index}`"
            class="*:overflow-visible!"
          >
            <!-- # index -->
            <td class="text-center">
              <div>{{ $index + 1 }}</div>
            </td>

            <!-- component -->
            <td>
              <app-input-error-message-handler class="flex-1" [grouped]="false" [fc]="item.controls.componentId">
                <ng-select
                  class="app-select"
                  [items]="displayedProducts()"
                  bindLabel="name"
                  [formControl]="item.controls.componentId"
                  (change)="onExistingRowComponentChange($event, $index)"
                  bindValue="id"
                  placeholder="اختر المكون"
                  [clearable]="false"
                  appendTo="body"
                  #productComponentRowProduct
                  appDebounce
                  [customEvents]="[
                    { type: 'searchEvent', value: productComponentRowProduct.searchEvent },
                    { type: 'scrollToEnd', value: productComponentRowProduct.scrollToEnd },
                  ]"
                  (debounced)="debouncedProductsSearch($event, productComponentRowProduct.searchTerm)"
                />
              </app-input-error-message-handler>
            </td>

            <!-- unit -->
            <td class="overflow-visible!">
              <app-input-error-message-handler [grouped]="false" [fc]="item.controls.unitId">
                <ng-select
                  class="app-select"
                  [items]="item.controls.units.value"
                  [formControl]="item.controls.unitId"
                  bindLabel="unitName"
                  bindValue="unitId"
                  placeholder="الوحدة"
                  appendTo="body"
                  [clearable]="false"
                />
              </app-input-error-message-handler>
            </td>

            <!-- quantity — inline editable -->
            <td>
              <app-input-error-message-handler [grouped]="false" [fc]="item.controls.quantity">
                <input
                  pInputText
                  appAllowNumbers
                  type="number"
                  [allowDecimal]="true"
                  [min]="1"
                  [formControl]="item.controls.quantity"
                  class="app-input text-center no-input-spinner"
                  placeholder="1"
                />
              </app-input-error-message-handler>
            </td>

            <!-- price (display-only, auto-calculated) -->
            <td>
              <div class="pc-price-cell">
                {{ (+(item?.value?.quantity ?? 0) * getUnitPrice($index))?.toFixed(2) }}
              </div>
            </td>

            <!-- actions — delete only -->
            <td>
              <div class="actions">
                <button
                  type="button"
                  class="delete"
                  pTooltip="حذف"
                  tooltipPosition="top"
                  (click)="deleteProductComponentRow($index)"
                >
                  <svg width="15" height="16" viewBox="0 0 15 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path opacity="0.4" d="M13.3136 5.99076C13.3136 6.04515 12.8872 11.4378 12.6437 13.7073C12.4912 15.1 11.5933 15.9448 10.2466 15.9688C9.21176 15.992 8.19875 16 7.20208 16C6.14394 16 5.10915 15.992 4.1047 15.9688C2.80303 15.9376 1.90439 15.076 1.75968 13.7073C1.50915 11.4298 1.09056 6.04515 1.08278 5.99076C1.075 5.82676 1.12791 5.67077 1.23528 5.54437C1.34109 5.42758 1.49359 5.35718 1.65386 5.35718H12.7503C12.9098 5.35718 13.0545 5.42758 13.1689 5.54437C13.2755 5.67077 13.3292 5.82676 13.3136 5.99076Z" fill="#FF383C"/>
                    <path d="M14.4 3.18149C14.4 2.8527 14.1409 2.59511 13.8297 2.59511H11.4971C11.0225 2.59511 10.6102 2.25752 10.5043 1.78154L10.3736 1.19836C10.1908 0.493583 9.5598 0 8.85178 0H5.549C4.8332 0 4.20843 0.493583 4.01859 1.23676L3.89643 1.78234C3.78984 2.25752 3.37748 2.59511 2.90365 2.59511H0.571083C0.259088 2.59511 0 2.8527 0 3.18149V3.48548C0 3.80627 0.259088 4.07186 0.571083 4.07186H13.8297C14.1409 4.07186 14.4 3.80627 14.4 3.48548V3.18149Z" fill="#FF383C"/>
                  </svg>
                </button>
              </div>
            </td>

          </tr>
        }

      </tbody>
    </table>
  </div>

</form>
