<div [class]="'app-print-options ' + styleClass()">
    @for (printer of printerItems(); track printer.id + '-' + printer.appPrinterType) {
        <label [for]="`printer-${printer.id}-${printer.ipAddressOrMacAddress}-${$index}`">
            <input
                [id]="`printer-${printer.id}-${printer.ipAddressOrMacAddress}-${$index}`"
                type="checkbox"
                [checked]="isPrinterSelected(printer)"
                [value]="printer"
                (change)="onPrinterSelect(printer)"
            />

            <span class="printer-card-icon" aria-hidden="true">
                @switch (printer.appPrinterType) {
                    @case (appPrinterType.captionOrderPrinter) {
                        📋
                    }
                    @case (appPrinterType.cashierPrinter) {
                        🧾
                    }
                    @case (appPrinterType.programPrinter) {
                        🍳
                    }
                }
            </span>

            <span class="printer-card-text">
                <span class="printer-card-title">{{ getPrinterRoleLabel(printer) }}</span>
                <span class="printer-card-subtitle" [title]="printer.name">{{ printer.name }}</span>
            </span>

            @if (!isPosCompact()) {
                @if (printer.appPrinterType !== appPrinterType.programPrinter) {
                    <span class="printer-card-badge">
                        @switch (printer.type) {
                            @case (PrinterType.Bluetooth) {
                                <span class="text-cyan-600">Bluetooth</span>
                            }
                            @case (PrinterType.Network) {
                                <span class="text-green-600">Network</span>
                            }
                        }
                    </span>
                }
            }
        </label>
    }
</div>
