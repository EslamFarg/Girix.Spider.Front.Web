<div class="h-full overflow-auto no-scrollbar p-4">
  <app-section-wrapper class="flex flex-col gap-5">
    <!-- search -->
    <form
      id="tableForm"
      #form
      (reset)="resetForm()"
      [formGroup]="fg"
      (ngSubmit)="onSubmit()"
      class="flex flex-1 w-full items-start gap-2 *:flex-1"
    >
      <div>
        <label for="">اسم الطاوله</label>
        <app-input-error-message-handler [fc]="fg.get('name')">
          <input
            class="w-full bg-transparent!"
            maxlength="100"
            pInputText
            type="text"
            formControlName="name"
            placeholder="بحث"
          />
        </app-input-error-message-handler>
      </div>
    </form>

    <!-- actions -->
    <div class="w-full overflow-auto custom-scroll flex items-center justify-end gap-2 my-4">
      <button
        type="submit"
        form="tableForm"
        class="flex-1 md:flex-none border-dark-line! bg-dark-line! text-white! py-1! md:px-8!"
        pButton
      >
        @if(currentItem) { تحديث } @else { حفظ }
      </button>
      <button
        type="reset"
        form="tableForm"
        class="flex-1 md:flex-none p-button-outlined border-dark-line! text-dark-line! py-1! md:px-8!"
        pButton
      >
        جديد
      </button>
    </div>

    <!-- data -->
    <table class="w-full main-table">
      <thead>
        <tr class="">
          <th>#</th>
          <th>الطاولات</th>
          <th>الأدوات</th>
        </tr>
      </thead>
      <tbody>
        @for (table of items(); track $index) {
        <tr class="">
          <td>{{ getRowNumber($index, paginationInfo.pageIndex) }}</td>
          <td>{{ table.name }}</td>
          <td>
            <div class="actions">
              <!-- edit -->
              <button type="button" class="edit" (click)="fetchAndBindTableData(table.id)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    opacity="0.4"
                    d="M15.1055 14.1807H10.0439C9.55009 14.1807 9.14844 14.5887 9.14844 15.0903C9.14844 15.5929 9.55009 16 10.0439 16H15.1055C15.5993 16 16.001 15.5929 16.001 15.0903C16.001 14.5887 15.5993 14.1807 15.1055 14.1807Z"
                    fill="#1F1D2B"
                  />
                  <path
                    d="M6.49691 3.46993L11.2932 7.34556C11.4089 7.43825 11.4287 7.60833 11.3384 7.72682L5.65222 15.136C5.29477 15.5937 4.76801 15.8527 4.20363 15.8622L1.09952 15.9004C0.933968 15.9023 0.789109 15.7877 0.751484 15.6233L0.0460042 12.5561C-0.0762789 11.9923 0.0460042 11.4094 0.403447 10.9603L6.11783 3.51579C6.21001 3.39635 6.38027 3.37533 6.49691 3.46993Z"
                    fill="#1F1D2B"
                  />
                  <path
                    opacity="0.4"
                    d="M13.4398 5.03595L12.5152 6.19023C12.4221 6.30776 12.2546 6.32687 12.1389 6.23323C11.0149 5.32356 8.1365 2.9892 7.3379 2.3423C7.22126 2.24675 7.20527 2.07666 7.29933 1.95818L8.19106 0.850717C9.00001 -0.190812 10.411 -0.286365 11.5491 0.62139L12.8566 1.66292C13.3928 2.08335 13.7502 2.63756 13.8725 3.22044C14.0136 3.8616 13.8631 4.49129 13.4398 5.03595Z"
                    fill="#1F1D2B"
                  />
                </svg>
              </button>
              <!-- delete -->
              <button type="button" class="delete" (click)="deleteTable(table.id, $event)">
                <svg width="15" height="16" viewBox="0 0 15 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    opacity="0.4"
                    d="M13.3136 5.99076C13.3136 6.04515 12.8872 11.4378 12.6437 13.7073C12.4912 15.1 11.5933 15.9448 10.2466 15.9688C9.21176 15.992 8.19875 16 7.20208 16C6.14394 16 5.10915 15.992 4.1047 15.9688C2.80303 15.9376 1.90439 15.076 1.75968 13.7073C1.50915 11.4298 1.09056 6.04515 1.08278 5.99076C1.075 5.82676 1.12791 5.67077 1.23528 5.54437C1.34109 5.42758 1.49359 5.35718 1.65386 5.35718H12.7503C12.9098 5.35718 13.0545 5.42758 13.1689 5.54437C13.2755 5.67077 13.3292 5.82676 13.3136 5.99076Z"
                    fill="#FF383C"
                  />
                  <path
                    d="M14.4 3.18149C14.4 2.8527 14.1409 2.59511 13.8297 2.59511H11.4971C11.0225 2.59511 10.6102 2.25752 10.5043 1.78154L10.3736 1.19836C10.1908 0.493583 9.5598 0 8.85178 0H5.549C4.8332 0 4.20843 0.493583 4.01859 1.23676L3.89643 1.78234C3.78984 2.25752 3.37748 2.59511 2.90365 2.59511H0.571083C0.259088 2.59511 0 2.8527 0 3.18149V3.48548C0 3.80627 0.259088 4.07186 0.571083 4.07186H13.8297C14.1409 4.07186 14.4 3.80627 14.4 3.48548V3.18149Z"
                    fill="#FF383C"
                  />
                </svg>
              </button>
            </div>
          </td>
        </tr>
        }
      </tbody>
    </table>

    <p-paginator
      (onPageChange)="onPageChange($event)"
      [first]="first"
      [rows]="rows"
      [totalRecords]="paginationInfo.totalRowsCount"
    />
  </app-section-wrapper>
</div>
