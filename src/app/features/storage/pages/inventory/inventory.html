<div class="p-4 h-full overflow-auto custom-scroll">
  <app-section-wrapper>
    <div class="grid grid-cols-4 gap-4 flex-1 my-4">
      <!-- invoice number -->
      <div>
        <label for="productName">رقم التسويه</label>
        <app-input-error-message-handler>
          <input type="text" pInputText id="productName" aria-describedby="productName-help" placeholder="الاسم" />
        </app-input-error-message-handler>
      </div>
      <!-- invoice number search -->
      <div>
        <label for="productPrice">بحث برقم التسويه</label>
        <app-input-error-message-handler>
          <input type="text" pInputText id="productPrice" aria-describedby="productPrice-help" placeholder="السعر" />
          <p-inputgroup-addon class="p-0!">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="10.5992" cy="10.6532" rx="8.59922" ry="8.65324" fill="#E0E6E9" />
              <path
                opacity="0.4"
                d="M20.6765 21.9555C20.3424 21.9447 20.0248 21.8073 19.7872 21.5707L17.7508 19.1904C17.3142 18.7912 17.2785 18.1126 17.6708 17.6692C17.8544 17.4834 18.104 17.3789 18.3644 17.3789C18.6248 17.3789 18.8744 17.4834 19.058 17.6692L21.6191 19.7184C21.988 20.096 22.1019 20.6565 21.9097 21.1495C21.7176 21.6424 21.2555 21.9757 20.7298 22.0003L20.6765 21.9555Z"
                fill="#393C49"
              />
            </svg>
          </p-inputgroup-addon>
        </app-input-error-message-handler>
      </div>
      <!-- invoice number search -->
      <div>
        <label for="productPrice">الرقم الدفتري</label>
        <app-input-error-message-handler>
          <input type="text" pInputText id="productPrice" aria-describedby="productPrice-help" placeholder="السعر" />
        </app-input-error-message-handler>
      </div>
      <!-- date -->
      <div>
        <label for="productName">التاريخ</label>

          <p-datepicker [iconDisplay]="'input'" [showIcon]="true" inputId="templatedisplay">

                fill="none"

        </app-input-error-message-handler>
      </div>
      <!--  -->
      <div
        class="px-4 text-dark-bg-1 [&>input]:checked:accent-dark-bg-1 text-sm font-semibold flex items-center gap-2 *:cursor-pointer"
      >
        <input
          [defaultChecked]="true"
          id="allQuantities"
          type="radio"
          name="inventoryFilterRadio"
          aria-describedby="productPrice-help"
          placeholder="السعر"
        />
        <label for="allQuantities">كل الكميات</label>
      </div>
      <!--  -->
      <div
        class="px-4 text-dark-bg-1 [&>input]:checked:accent-dark-bg-1 text-sm font-semibold flex items-center gap-2 *:cursor-pointer"
      >
        <input
          id="quantityGreaterThanZero"
          type="radio"
          name="inventoryFilterRadio"
          aria-describedby="productPrice-help"
          placeholder="السعر"
        />
        <label for="quantityGreaterThanZero">اكبر من الصفر</label>
      </div>
      <!--  -->
      <div
        class="px-4 text-dark-bg-1 [&>input]:checked:accent-dark-bg-1 text-sm font-semibold flex items-center gap-2 *:cursor-pointer"
      >
        <input
          id="quantityLessThanZero"
          type="radio"
          name="inventoryFilterRadio"
          aria-describedby="productPrice-help"
          placeholder="السعر"
        />
        <label for="quantityLessThanZero">اصغر من الصفر</label>
      </div>
      <!--  -->
      <div
        class="px-4 text-dark-bg-1 [&>input]:checked:accent-dark-bg-1 text-sm font-semibold flex items-center gap-2 *:cursor-pointer"
      >
        <input
          id="quantityEqualsZero"
          type="radio"
          name="inventoryFilterRadio"
          aria-describedby="productPrice-help"
          placeholder="السعر"
        />
        <label for="quantityEqualsZero">تساوي الصفر</label>
      </div>
    </div>
  </app-section-wrapper>

  <app-section-wrapper class="block mt-4">
