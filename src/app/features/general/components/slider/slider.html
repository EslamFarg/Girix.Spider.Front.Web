<div class="flex gap-2 items-center w-full" style="--p-button-primary-background:transparent;--p-button-primary-color:black">
  <button (click)="scrollRight()" pButton class="border-0!">
    <i class="pi pi-chevron-right"></i>
  </button>
  <div class="flex-1 overflow-hidden">
    <div class="flex items-center w-full overflow-auto no-scrollbar" #itemsContainer>
      @for (item of items(); track $index) {
        <div class="px-1" [style]="`width: ${config().itemWidth}px;min-width: ${config().itemWidth}px`">
          <ng-container *ngTemplateOutlet="template() ; context: {$implicit: item}"></ng-container>
        </div>
      }
    </div>
  </div>
  <button (click)="scrollLeft()" pButton class="border-0!">
    <i class="pi pi-chevron-left"></i>
  </button>
</div>
