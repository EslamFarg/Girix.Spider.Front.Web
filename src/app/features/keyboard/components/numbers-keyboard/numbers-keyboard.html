<div
  class="grid grid-cols-3 p-2 gap-1.5 bg-[#D1D5DBE5] text-2xl"
  style="
    --p-button-primary-background: #ffffff;
    --p-button-primary-color: #000000;
    --p-button-primary-border-color: transparent;
  "
>
  @for (btn of btns; track $index) {
    <button
      pButton
      class="rounded-sm w-full py-2 cursor-pointer flex items-center justify-center"
      style="box-shadow: 0px 1px 0px 0px #0000004d"
      (click)="triggerNumbersBtn(btn.value)"
    >
      <span [innerHTML]="bypass(btn.label)"></span>
    </button>
  }
</div>
