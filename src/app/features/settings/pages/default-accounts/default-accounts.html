<div class="overflow-auto custom-scroll h-full">
  <app-section-wrapper class="p-4 " styleClass="flex flex-col gap-6 py-6!">
    @for (item of [1,2,3,4,5,6,7]; track $index) {
    <div class="grid md:grid-cols-2 gap-4 border-b md:border-b-0 border-dark-line/20 pb-6 md:pb-0">
      <app-input-error-message-handler>
        <p-select
          [options]="[]"
          optionLabel="name"
          placeholder="اسم الحساب.."
          class="w-full! *:text-dark-line! border-dark-line!"
        />
      </app-input-error-message-handler>
      <app-input-error-message-handler>
        <p-select
          [options]="[]"
          optionLabel="name"
          placeholder="الحساب المقابل..."
          class="w-full! *:text-dark-line! border-dark-line!"
        />
      </app-input-error-message-handler>
    </div>
    }

    <p-button class="ms-auto" styleClass="border-dark-line! bg-dark-line! text-white! py-1! px-8!" label="طباعه" />
  </app-section-wrapper>
</div>
