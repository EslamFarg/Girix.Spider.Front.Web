<app-section-wrapper class="p-4 sm:px-6 h-full" styleClass="flex flex-col gap-10 h-full">
  <section class="flex items-center justify-center flex-1">
    <div class="flex flex-col gap-6 p-10 w-full max-w-120">
      <h1 class="text-xl font-bold text-center select-none">تغيير كلمة المرور</h1>
      <p class="text-text-dark text-sm text-center max-w-80 mx-auto leading-relaxed">
        يجب أن تكون كلمة المرور الجديدة الخاصة بك فريدة من نوعها مقارنة بكلمات المرور التي استخدمتها سابقًا.
      </p>
      <form class="flex flex-col gap-4" [formGroup]="fg" (ngSubmit)="onSubmit()">
        <app-input-error-message-handler>
          <p-password
            class="app-input h-12! [&>input]:h-12!"
            formControlName="newPassword"
            placeholder="كلمة المرور الجديدة"
            [toggleMask]="true"
            #newPassword
          />
        </app-input-error-message-handler>
        <app-input-error-message-handler>
          <p-password
            class="app-input h-12! [&>input]:h-12!"
            placeholder="تأكيد كلمة المرور الجديدة"
            formControlName="confirmPassword"
            #confirmPassword
            [invalid]="newPassword.value !== confirmPassword.value && fg.get('confirmPassword')!.touched"
            [toggleMask]="true"
            [feedback]="false"
          />
        </app-input-error-message-handler>
        <p-button
          type="submit"
          label="حفظ"
          appLoadingDisabled
          class="w-full max-w-44 mx-auto"
          styleClass="w-full border-dark-bg-1! bg-dark-line! cursor-pointer ! rounded py-2.5 mt-4 text-white!"
        />
      </form>
    </div>
  </section>
</app-section-wrapper>
