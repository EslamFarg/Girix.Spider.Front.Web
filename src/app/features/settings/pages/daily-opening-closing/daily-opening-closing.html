<div class="min-h-full h-full overflow-auto custom-scroll">
  <app-section-wrapper class="p-4 " styleClass="flex flex-col gap-4">
  <!-- search -->
  <form #form [formGroup]="fg" (ngSubmit)="onSubmit()" class="h-fit items-start gap-2 border w-full">
    <app-input-error-message-handler [fc]="fg.get('text')">
      <input class="w-full bg-transparent!" pInputText type="text" formControlName="text" placeholder="بحث" />
      <p-inputgroup-addon>
        <i class="pi pi-filter"></i>
      </p-inputgroup-addon>
      <p-inputgroup-addon>
        <i class="pi pi-search"></i>
      </p-inputgroup-addon>
    </app-input-error-message-handler>
  </form>

  <section class="grid md:grid-cols-2 xl:grid-cols-4 gap-4">
    <div class="border border-text-gray flex items-center gap-4 rounded-lg h-8 px-4 text-sm">
      <span class="text-dark-line">اسم المستخدم</span>
      <span class="text-text-gray">محمد احمد محمود</span>
    </div>
    <div class="border border-text-gray flex items-center gap-4 rounded-lg h-8 px-4 text-sm">
      <span class="text-dark-line">رقم الجوال</span>
      <span class="text-text-gray">0123456789</span>
    </div>
    <div class="border border-text-gray flex items-center gap-4 rounded-lg h-8 px-4 text-sm">
      <span class="text-dark-line">إجمالي العجز</span>
      <span class="text-text-gray">1200.00</span>
    </div>
    <div class="border border-text-gray flex items-center gap-4 rounded-lg h-8 px-4 text-sm">
      <span class="text-dark-line">نوع المستخدم</span>
      <span class="text-[#FF383C]">كاشير</span>
    </div>
  </section>

  <section
    class="flex items-center gap-2 sm:gap-4 w-full max-w-125 mx-auto"
    style="--p-button-primary-background: var(--color-text-lighter); --p-button-primary-border-color: transparent"
  >
    <p-button
      styleClass="w-full"
      class="text-dark-bg-1 h-12.5 flex-1 text-center px-1 rounded-lg font-semibold flex items-center justify-center"
      ><span>اللغه</span>
    </p-button>
    
    <p-button
      styleClass="w-full"
      class="text-dark-bg-1 h-12.5 flex-1 text-center px-1 rounded-lg font-semibold flex items-center justify-center"
      ><span>حول البرنامج</span>
    </p-button>
    
    <p-button
      styleClass="w-full"
      class="text-dark-bg-1 h-12.5 flex-1 text-center px-1 rounded-lg font-semibold flex items-center justify-center"
      ><span>الدعم الفني</span>
    </p-button>
  </section>

  <form action="">

    <p-carousel
      [value]="sectionIds"
      [numVisible]="1"
      [showIndicators]="false"
      [showNavigators]="false"
      [numScroll]="1"
      [circular]="false"
      [responsiveOptions]="responsiveOptions"
    >
      <ng-template let-item #item>
        @switch (item) { @case (DocFormSections.opening) {
        <div class="flex flex-col gap-4">
          <!-- الرصيد السابق -->
          <div class="doc-input">
            <label for="productPrice" class="mb-0!">الرصيد السابق</label>
            <app-input-error-message-handler>
              <input pInputText id="productPrice" aria-describedby="productPrice-help" placeholder="3000" />
            </app-input-error-message-handler>
          </div>
          <!-- العهده -->
          <div class="doc-input">
            <label for="" class="mb-0!">الرصيد السابق</label>
            <app-input-error-message-handler>
              <input pInputText id="productName" aria-describedby="productName-help" placeholder="3000" />
            </app-input-error-message-handler>
          </div>
          <!-- ملاحظات -->
          <div>
            <label for="" class="text-dark-bg-1 font-medium text-sm">ملاحظات</label>
            <div class="doc-input my-1">
              <app-input-error-message-handler class="w-full">
                <textarea
                  rows="5"
                  cols="30"
                  pTextarea
                  class="w-full"
                  id="productName"
                  aria-describedby="productName-help"
                  placeholder="ملاحظات"
                ></textarea>
              </app-input-error-message-handler>
            </div>
          </div>
        </div>
        } @case (DocFormSections.closing) { } @case (DocFormSections.deficitReduction) { } }
      </ng-template>
    </p-carousel>

    <div class="ms-auto w-fit mt-4">
      <p-button
           styleClass="border-dark-line! bg-dark-line! text-white! py-1!    md:px-8!"
            label="حفظ"
        />
    </div>

  </form>
</app-section-wrapper>

</div>
