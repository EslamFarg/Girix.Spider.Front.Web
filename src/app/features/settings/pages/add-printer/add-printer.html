<div class="custom-scroll overflow-auto h-full">
  <app-section-wrapper class="p-4 sm:px-6 min-h-full" styleClass="flex flex-col gap-4">
    <form action="" class="flex flex-col gap-4 md:gap-6">
      <!-- اسم الطابعه -->
      <div>
        <label for="productPrice">اسم الطابعه</label>
        <app-input-error-message-handler>
          <input type="text" pInputText id="productPrice" aria-describedby="productPrice-help" placeholder="الاسم" />
          <p-inputgroup-addon class="p-0! overflow-hidden">
            <span class="bg-dark-bg-1 flex items-center justify-center cursor-pointer h-full w-full rounded-inherit">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M8 14.666C7.16667 14.666 6.38622 14.5078 5.65867 14.1913C4.93111 13.8749 4.29778 13.4471 3.75867 12.908C3.21956 12.3689 2.79178 11.7356 2.47533 11.008C2.15889 10.2805 2.00044 9.49979 2 8.66602H3.33333C3.33333 9.96602 3.78622 11.0689 4.692 11.9747C5.59778 12.8805 6.70044 13.3331 8 13.3327C9.29956 13.3322 10.4024 12.8796 11.3087 11.9747C12.2149 11.0698 12.6676 9.9669 12.6667 8.66602C12.6658 7.36513 12.2131 6.26246 11.3087 5.35802C10.4042 4.45357 9.30133 4.00068 8 3.99935H7.9L8.93333 5.03268L8 5.99935L5.33333 3.33268L8 0.666016L8.93333 1.63268L7.9 2.66602H8C8.83333 2.66602 9.614 2.82446 10.342 3.14135C11.07 3.45824 11.7033 3.88602 12.242 4.42468C12.7807 4.96335 13.2084 5.59668 13.5253 6.32468C13.8422 7.05268 14.0004 7.83313 14 8.66602C13.9996 9.49891 13.8413 10.2796 13.5253 11.008C13.2093 11.7365 12.7816 12.3698 12.242 12.908C11.7024 13.4462 11.0691 13.874 10.342 14.1913C9.61489 14.5087 8.83422 14.6669 8 14.666Z"
                  fill="white"
                />
              </svg>
            </span>
          </p-inputgroup-addon>
        </app-input-error-message-handler>
      </div>

      <!-- IP Address -->
      <div>
        <label for="productName">IP Address</label>
        <app-input-error-message-handler>
          <input pInputText id="productName" aria-describedby="productName-help" placeholder="ip address" />
        </app-input-error-message-handler>
      </div>

      <!-- Port -->
      <div>
        <label for="productName">Port</label>
        <app-input-error-message-handler>
          <input pInputText id="productName" aria-describedby="productName-help" placeholder="port" />
        </app-input-error-message-handler>
      </div>

      <!-- Printer Type -->
      <div>
        <label for="printerTypeNetwork" class="mb-4!">نوع الطابعه</label>
        <app-input-error-message-handler>
          <label for="printerTypeNetwork" class="me-3 text-xs cursor-pointer">
            <input type="radio" class="me-1" name="printerTypeRadio" id="printerTypeNetwork" [value]="PrinterType.Network" />
            <span>شبكة</span>
          </label>
          <label for="printerTypeBluetooth" class="text-xs cursor-pointer">
            <input type="radio" class="me-1" name="printerTypeRadio" id="printerTypeBluetooth" [value]="PrinterType.Bluetooth" />
            <span>بلوتوث</span>
          </label>
        </app-input-error-message-handler>
      </div>

      <div class="w-full overflow-auto custom-scroll flex items-center justify-end gap-2 md:mt-4">
        <p-button
          class="flex-1 md:flex-none"
          styleClass="border-dark-line! bg-dark-line! text-white! py-1! w-full  md:px-8!"
          label="حفظ"
        />
        <p-button
          class="flex-1 md:flex-none"
          styleClass="border-dark-line! text-dark-line! py-1! w-full flex-1 md:flex-none md:px-8!"
          label="جديد"
          variant="outlined"
        />
      </div>
    </form>

    <div class="w-full overflow-auto custom-scroll">
      <table class="my-4 w-full main-table">
        <thead>
          <tr class="">
            <th>#</th>
            <th>اسم الطابعه</th>
            <th>IP Address</th>
            <th>Port</th>
            <th>الأدوات</th>
          </tr>
        </thead>
        <tbody>
          @for (item of printers(); track $index) {
            <tr class="" [style]="`--ix:${$index}`">
              <td>{{ $index + 1 }}</td>
              <td>
                <div>{{ item.name }}</div>
              </td>
              <td>
                <div>{{ item.ipAddressOrMacAddress }}</div>
              </td>
              <td>
                <div>{{ item.port }}</div>
              </td>
              <td>
                <div class="actions">
                  <button type="button" class="edit">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path
                        opacity="0.4"
                        d="M15.1055 14.1807H10.0439C9.55009 14.1807 9.14844 14.5887 9.14844 15.0903C9.14844 15.5929 9.55009 16 10.0439 16H15.1055C15.5993 16 16.001 15.5929 16.001 15.0903C16.001 14.5887 15.5993 14.1807 15.1055 14.1807Z"
                        fill="#1F1D2B"
                      />
                      <path
                        d="M6.49691 3.46993L11.2932 7.34556C11.4089 7.43825 11.4287 7.60833 11.3384 7.72682L5.65222 15.136C5.29477 15.5937 4.76801 15.8527 4.20363 15.8622L1.09952 15.9004C0.933968 15.9023 0.789109 15.7877 0.751484 15.6233L0.0460042 12.5561C-0.0762789 11.9923 0.0460042 11.4094 0.403447 10.9603L6.11783 3.51579C6.21001 3.39635 6.38027 3.37533 6.49691 3.46993Z"
                        fill="#1F1D2B"
                      />
                      <path
                        opacity="0.4"
                        d="M13.4398 5.03595L12.5152 6.19023C12.4221 6.30776 12.2546 6.32687 12.1389 6.23323C11.0149 5.32356 8.1365 2.9892 7.3379 2.3423C7.22126 2.24675 7.20527 2.07666 7.29933 1.95818L8.19106 0.850717C9.00001 -0.190812 10.411 -0.286365 11.5491 0.62139L12.8566 1.66292C13.3928 2.08335 13.7502 2.63756 13.8725 3.22044C14.0136 3.8616 13.8631 4.49129 13.4398 5.03595Z"
                        fill="#1F1D2B"
                      />
                    </svg>
                  </button>
                  <button type="button" class="delete">
                    <svg width="15" height="16" viewBox="0 0 15 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path
                        opacity="0.4"
                        d="M13.3136 5.99076C13.3136 6.04515 12.8872 11.4378 12.6437 13.7073C12.4912 15.1 11.5933 15.9448 10.2466 15.9688C9.21176 15.992 8.19875 16 7.20208 16C6.14394 16 5.10915 15.992 4.1047 15.9688C2.80303 15.9376 1.90439 15.076 1.75968 13.7073C1.50915 11.4298 1.09056 6.04515 1.08278 5.99076C1.075 5.82676 1.12791 5.67077 1.23528 5.54437C1.34109 5.42758 1.49359 5.35718 1.65386 5.35718H12.7503C12.9098 5.35718 13.0545 5.42758 13.1689 5.54437C13.2755 5.67077 13.3292 5.82676 13.3136 5.99076Z"
                        fill="#FF383C"
                      />
                      <path
                        d="M14.4 3.18149C14.4 2.8527 14.1409 2.59511 13.8297 2.59511H11.4971C11.0225 2.59511 10.6102 2.25752 10.5043 1.78154L10.3736 1.19836C10.1908 0.493583 9.5598 0 8.85178 0H5.549C4.8332 0 4.20843 0.493583 4.01859 1.23676L3.89643 1.78234C3.78984 2.25752 3.37748 2.59511 2.90365 2.59511H0.571083C0.259088 2.59511 0 2.8527 0 3.18149V3.48548C0 3.80627 0.259088 4.07186 0.571083 4.07186H13.8297C14.1409 4.07186 14.4 3.80627 14.4 3.48548V3.18149Z"
                        fill="#FF383C"
                      />
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </app-section-wrapper>
</div>
