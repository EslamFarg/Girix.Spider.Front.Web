<div class="w-full overflow-auto">
  <table class="my-2 sm:my-4 w-full main-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Shortage</th>
      </tr>
    </thead>
    <tbody>
      @for (item of shortages(); track $index) {
        <tr [style]="`--ix:${$index}`">
          <td>
            <div>{{ item.openStartDate | date: 'mediumDate' }}</div>
          </td>
          <td class="font-bold">
            <div>{{ item.shortage }}</div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
