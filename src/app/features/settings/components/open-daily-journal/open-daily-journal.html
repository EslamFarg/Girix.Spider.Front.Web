<form appLoadingDisabled class="flex flex-col gap-4" [formGroup]="fg" (ngSubmit)="onSubmitOpenDaily()">
    <!-- الرصيد السابق -->
    <div>
        <label>{{ 'DAILY_JOURNAL.PREVIOUS_BALANCE' | translate }}</label>
        <app-input-error-message-handler>
            <input pInputText id="productName" disabled aria-describedby="productName-help" [value]="0" />
        </app-input-error-message-handler>
    </div>

    <!-- العهده -->
    <div>
        <label>{{ 'DAILY_JOURNAL.CUSTODY_BALANCE' | translate }}</label>
        <app-input-error-message-handler [fc]="fg.controls.custodyBalance">
            <input
                pInputText
                id="custodyBalance"
                formControlName="custodyBalance"
                aria-describedby="custodyBalance-help"
                placeholder=""
            />
        </app-input-error-message-handler>
    </div>

    <!-- ملاحظات -->
    <div>
        <label>{{ 'DAILY_JOURNAL.NOTES' | translate }}</label>
        <app-input-error-message-handler [fc]="fg.controls.openingNotes">
            <textarea
                rows="5"
                pTextarea
                class="flex-1"
                formControlName="openingNotes"
                class="w-full"
                id="openingNotes"
                aria-describedby="openingNotes-help"
                placeholder=""
            ></textarea>
        </app-input-error-message-handler>
    </div>


    <button
        pButton
        appLoadingDisabled
        style="--p-button-primary-background: var(--color-dark-line)"
        class="border-dark-line! text-white! py-1! md:px-8! w-fit ms-auto mt-4"
        type="submit"
    >
        {{ 'ACTIONS.OPEN' | translate }}
    </button>
</form>
