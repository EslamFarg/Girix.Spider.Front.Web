<form class="flex flex-col gap-4" [formGroup]="fg" (ngSubmit)="onSubmitOpenDaily()">
  <div class="doc-input flex opacity-70">
    <label for="previousBalance" class="mb-0!">Previous balance</label>
    <input
      pInputText
      id="previousBalance"
      disabled
      class="flex-1"
      aria-describedby="previousBalance-help"
      [value]="currentUserDaily()?.value?.dailyJournalPeriods?.openingBalance ?? 0"
      placeholder="0"
    />
  </div>

  <div class="doc-input flex opacity-70">
    <label for="custodyBalance" class="mb-0!">Custody balance</label>
    <input
      pInputText
      id="custodyBalance"
      formControlName="custodyBalance"
      class="flex-1"
      aria-describedby="custodyBalance-help"
      placeholder=""
    />
  </div>
  <app-input-error-message-handler [fc]="fg.get('custodyBalance')" />

  <div>
    <label for="openingNotes" class="text-dark-bg-1 font-medium text-sm">Notes</label>
    <div class="doc-input flex my-1">
      <textarea
        rows="5"
        cols="30"
        pTextarea
        class="flex-1"
        formControlName="openingNotes"
        id="openingNotes"
        aria-describedby="openingNotes-help"
        placeholder=""
      ></textarea>
    </div>
  </div>
  <app-input-error-message-handler class="w-full" [fc]="fg.get('openingNotes')" />

  <button
    pButton
    style="--p-button-primary-background: var(--color-dark-line)"
    class="border-dark-line! text-white! py-1! md:px-8! w-fit ms-auto mt-4"
    type="submit"
  >
    {{ 'ACTIONS.OPEN' | translate }}
  </button>
</form>
