<form class="close-daily-journal" [formGroup]="fg" (ngSubmit)="onCloseDaily()">
  <!-- الرصيد السابق -->
  <div class="journal-row opacity-70 **:cursor-not-allowed!">
    <div class="journal-field">
      <label class="journal-label">الرصيد السابق</label>
      <div class="doc-input">
        <input disabled pInputText placeholder="0.0" />
      </div>
    </div>
    <div class="journal-field">
      <label class="journal-label">الحساب</label>
      <div class="doc-input">
        <input
          disabled
          pInputText
          placeholder=""
          [value]="currentUserDaily()?.value?.dailyJournalPeriods?.openingBalanceAccountName"
        />
      </div>
    </div>
  </div>

  <!-- العهده -->
  <div class="journal-row opacity-70 **:cursor-not-allowed!">
    <div class="journal-field">
      <label class="journal-label">العهدة</label>
      <div class="doc-input">
        <input
          disabled
          pInputText
          placeholder="0.0"
          [value]="currentUserDaily()?.value?.dailyJournalPeriods?.custodyBalance"
        />
      </div>
    </div>
    <div class="journal-field">
      <label class="journal-label">الحساب</label>
      <div class="doc-input">
        <input
          disabled
          pInputText
          placeholder=""
          [value]="currentUserDaily()?.value?.dailyJournalPeriods?.custodyAccountName"
        />
      </div>
    </div>
  </div>

  <!-- مبلغ غلق كاش -->
  <div class="journal-row">
    <div class="journal-field">
      <label class="journal-label">مبلغ غلق كاش</label>
      <div class="doc-input">
        <app-input-error-message-handler [fc]="fg.get('cashClosingAmount')">
          <input
            pInputText
            id="cashClosingAmount"
            formControlName="cashClosingAmount"
            aria-describedby="cashClosingAmount-help"
            placeholder="ادخل الرصيد"
          />
        </app-input-error-message-handler>
      </div>
    </div>
    <div class="journal-field opacity-70 **:cursor-not-allowed!">
      <label class="journal-label">الحساب</label>
      <div class="doc-input">
        <input pInputText disabled [value]="currentUserDaily()?.value?.dailyJournalPeriods?.cashAccountName" />
      </div>
    </div>
  </div>

  <!-- مبلغ غلق شيكه -->
  <div class="journal-row">
    <div class="journal-field">
      <label class="journal-label">مبلغ غلق شيكه</label>
      <div class="doc-input">
        <app-input-error-message-handler [fc]="fg.get('networkClosingAmount')">
          <input
            pInputText
            id="networkClosingAmount"
            formControlName="networkClosingAmount"
            aria-describedby="networkClosingAmount-help"
            placeholder="ادخل الرصيد"
          />
        </app-input-error-message-handler>
      </div>
    </div>
    <div class="journal-field opacity-70 **:cursor-not-allowed!">
      <label class="journal-label">الحساب</label>
      <div class="doc-input">
        <input pInputText disabled [value]="currentUserDaily()?.value?.dailyJournalPeriods?.cashAccountName" />
      </div>
    </div>
  </div>

  <!-- ملاحظات -->
  <div class="journal-notes">
    <label for="closingNotes" class="journal-label">ملاحظات</label>
    <div class="doc-input my-1">
      <textarea
        rows="5"
        cols="30"
        pTextarea
        class="w-full"
        id="closingNotes"
        formControlName="closingNotes"
        aria-describedby="closingNotes-help"
        placeholder="ملاحظات"
      ></textarea>
    </div>
  </div>

  <button
    pButton
    style="--p-button-primary-background: var(--color-dark-line)"
    class="border-dark-line! text-white! py-1! md:px-8! w-fit ms-auto mt-4"
    type="submit"
  >
    {{ 'actions.close' | translate }}
  </button>
</form>
