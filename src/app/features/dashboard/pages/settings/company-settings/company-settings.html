<h2 class="text-[var(--color-primary)] text-[20px] font-[700] my-6 mb-10 ">اعدادات الشركة</h2>

<form class="box_header mb-7">
  <div class="title">بيانات الشركة</div>



  <div class="grid grid-cols-1 lg:grid-cols-12 gap-[24px] mt-[10px] mb-[20px]">


    <div class="col-span-12 md:col-span-4">
        <label for="companyName">اسم الشركة</label>
        <input type="text" placeholder="اسم الشركة" id="companyName">
    </div>
    <div class="col-span-12 md:col-span-4">
        <label for="englishName">الأسم بالانجليزي</label>
        <input type="text" placeholder="الأسم بالانجليزي" id="englishName">
    </div>
    <div class="col-span-12 md:col-span-4">
        <label for="AccountBank">رقم الحساب البنكي</label>
        <input type="text" placeholder="رقم الحساب البنكي" id="AccountBank">
    </div>
    <div class="col-span-12 md:col-span-4">
        <label for="nationalType">نوع الهوية</label>
        <input type="text" placeholder="نوع الهوية" id="nationalType">
    </div>
    <div class="col-span-12 md:col-span-4">
        <label for="nationalId">رقم الهويه</label>
        <input type="text" placeholder="رقم الهويه" id="nationalId">
    </div>
    <div class="col-span-12 md:col-span-2">
        <label for="taxNumber">الرقم الضريبي</label>
        <input type="text" placeholder="الرقم الضريبي" id="taxNumber">
    </div>
    <div class="col-span-12 md:col-span-2">
        <label for="addtionNumber">الرقم الاضافي</label>
        <input type="text" placeholder="الرقم الاضافي" id="addtionNumber">
    </div>
    <div class="col-span-12 md:col-span-6">
        <label for="email">الايميل</label>
        <input type="text" placeholder="الايميل" id="email">
    </div>
    <div class="col-span-12 md:col-span-6">
        <label for="map">الموقع الالكتروني</label>
        <input type="text" placeholder="الموقع الاكتروني" id="map">
    </div>

      

    <div class="btns col-span-12 flex items-center  justify-end gap-[12px]">
        <button class="btn btn-primary">حفظ</button>
        <button class="btn">جديد</button>

    </div>
  

  </div>


</form>
