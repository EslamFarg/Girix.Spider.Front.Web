<app-page-header
  [titleHeader]="'استلام عهدة '"
  [explorerBtn]="explorerBtn"
  [actions]="actions"
  (actionClicked)="handleAction($event)"
></app-page-header>

<form class="box_header" [formGroup]="receiptForm">
  <div class="title">بيانات الموظف</div>
  <div class="input_group">
    <label>بحث </label>
    <div class="flex items-center gap-2 relative">
        <div class="prev" (click)="navigateEmployee('prev')">

      <div class="search_input relative w-[50%] ">

          type="text"
          class="text-[14px]"
          formControlName="employeeSearch"
          placeholder="رقم الموظف"
          (keydown.enter)="$event.preventDefault(); searchEmployee()"
          appOnlyNumber
          style="color:var(--color-black); font-weight:600; width:100%;"
        />

        </div>
      </div>
      <div class="next" (click)="navigateEmployee('next')">

</svg>

      </div>
    </div>
  </div>


  <div class="grid grid-cols-1 lg:grid-cols-12 gap-[24px] my-[20px] readonly_data">
    <div class="col-span-3">
        <label for="document" >رقم الموظف : </label>
        <input type="text" id="document" placeholder="رقم الموظف" [value]="employeeDisplay.employeeId" readonly style="padding-right:95px;">
    </div>
    <div class="col-span-3">
        <label for="reference">اسم الموظف : </label>
        <input type="text" placeholder="اسم الموظف" id="reference" [value]="employeeDisplay.employeeName" readonly style="padding-right:95px;">
    </div>
    <div class="col-span-3">
        <label for="reference">القسم : </label>
        <input type="text" placeholder="القسم" id="reference" [value]="employeeDisplay.departmentName" readonly style="padding-right:55px;">
    </div>
    <div class="col-span-3">
        <label for="reference"> رقم الجوال : </label>
        <input type="text" placeholder="رقم الجوال" id="reference" [value]="employeeDisplay.phoneNumber" readonly style="padding-right:80px;">
    </div>
    <div class="col-span-4">
        <label for="reference"> رقم الهوية : </label>
        <input type="text" placeholder="رقم الهوية" id="reference" [value]="employeeDisplay.nationalIdOrIqamaNumber" readonly style="padding-right:80px;">
    </div>
    <!-- <div class="col-span-3">
        <label for="reference"> الجنس : </label>
        <input type="text" placeholder="الجنس" id="reference" [value]="employeeDisplay.gender" readonly style="padding-right:60px;">
    </div> -->
  
    <div class="col-span-4">
        <label for="reference"> الجنسية : </label>
        <input type="text" placeholder="الجنسية" id="reference" [value]="employeeDisplay.nationality" readonly style="padding-right:65px;">
    </div>
    <div class="col-span-4">
        <label for="reference"> الراتب الاساسي : </label>
        <input type="text" placeholder="الراتب الاساسي" id="reference" [value]="employeeDisplay.baseSalary" readonly style="padding-right:105px;">
    </div>
  



  </div>


</form>





<form class="my-[20px] mt-[40px]" [formGroup]="receiptForm">

  <div class="grid grid-cols-1 md:grid-cols-12 gap-[24px] box_header pb-[20px]">
    <div class="title col-span-12">بيانات اضافيه</div>
    <div class="col-span-12 md:col-span-4 relative">
        <label for="expenses">العهد</label>
        <ng-select [items]="custodyItems" bindLabel="name" bindValue="id" formControlName="custodyId" [placeholder]="'العهد'"></ng-select>
        <app-form-error [control]="receiptForm.controls['custodyId']" [errorKey]="'required'" [message]="'العهد مطلوب'"></app-form-error>
    </div>
    <div class="col-span-12 md:col-span-4 relative">
        <label for="totalamount"> المبلغ</label>
        <input type="text" id="totalamount" placeholder="  المبلغ" formControlName="amount" appOnlyNumber>
        <app-form-error [control]="receiptForm.controls['amount']" [errorKey]="'required'" [message]="'المبلغ مطلوب'"></app-form-error>
    
    </div>
   
     <div class="col-span-12 md:col-span-4 relative">
        <label for="date">التاريخ</label>
          <p-datepicker formControlName="date" [iconDisplay]="'input'" [placeholder]="'التاريخ'" [showIcon]="true" inputId="date" />
        <app-form-error [control]="receiptForm.controls['date']" [errorKey]="'required'" [message]="'التاريخ مطلوب'"></app-form-error>
    
    </div>
  </div>
</form>

<app-shared-confirm-dialog
  [show]="showDeleteDialog"
  [title]="'حذف استلام عهدة'"
  [message]="'هل أنت متأكد من حذف هذا السجل ؟ لا يمكن التراجع عن هذا الإجراء.'"
  (confirm)="confirmDelete()"
  (cancel)="showDeleteDialog = false"
></app-shared-confirm-dialog>
