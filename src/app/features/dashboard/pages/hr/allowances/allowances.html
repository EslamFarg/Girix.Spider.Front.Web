<h3 class="mt-[20px] text-[20px] font-[700] mb-5">البدلات</h3>

<form class="grid grid-cols-1 md:grid-cols-12 gap-4" [formGroup]="allowancesForm" (ngSubmit)="onSubmit()">
   

    <div class="col-span-12 lg:col-span-6" >
        <label for="unitName">اسم البدل</label>
        <input type="text" placeholder="اسم البدل" id="unitName" formControlName="nameAr" maxlength="100">
        <app-form-error [control]="allowancesForm.controls['nameAr']" [errorKey]="'required'" [message]="'اسم البدل مطلوب'"></app-form-error>
        <app-form-error [control]="allowancesForm.controls['nameAr']" [errorKey]="'minlength'" [message]="'اسم البدل يجب ان يتكون من حرفين او اكثر'"></app-form-error>
        <app-form-error [control]="allowancesForm.controls['nameAr']" [errorKey]="'maxlength'" [message]="'اسم البدل يجب ان يكون اقل من 100 حرف'"></app-form-error>
        <app-form-error [control]="allowancesForm.controls['nameAr']" [errorKey]="'invalidEntityName'" [message]="'اسم البدل يجب ان يحتوي على حروف وارقام و _ و - فقط'"></app-form-error>
    </div>
    <div class="col-span-12 lg:col-span-6" >
        <label for="amount">المبلغ</label>
        <input type="text" placeholder="المبلغ" id="amount" formControlName="amount" maxlength="10" appOnlyNumber>
        <app-form-error [control]="allowancesForm.controls['amount']" [errorKey]="'required'" [message]="'المبلغ مطلوب'"></app-form-error>
    </div>

    <div class="col-span-12 flex justify-end gap-5 mt-[15px]">
        <button type="submit" class="btn" [ngClass]="{'btn-warning':isEditMode , 'btn-primary': !isEditMode}">{{isEditMode ? 'تعديل' : 'اضافة'}}</button>
        <button class="btn " type="button" (click)="resetForm()">جديد</button>
    </div>
  </form>
