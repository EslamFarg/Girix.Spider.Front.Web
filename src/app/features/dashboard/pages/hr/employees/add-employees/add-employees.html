<div class="flex justify-between flex-wrap mb-[25px] sticky top-[60px] pt-[10px] mt-[10px] bg-[var(--color-bg)] z-1">
    <div>
        
        <h2 class="text-[var(--color-primary)] text-[20px] font-[700]">الموظفين</h2>
      <div class="flex items-center flex-wrap gap-5 my-4
      [&>*]:w-[104px]  [&>*]:h-[32px]  
      ">
      
          <button class="btn" [ngClass]="{'btn-primary':!isEditMode,'btn-warning':isEditMode}" (click)="save()">

            {{isEditMode?'تعديل':'حفظ'}}
          </button>
          <button class="btn" (click)="reset()">جديد</button>
            @if(this.isEditMode){
              <button class="btn" (click)="delete()">حذف</button>
              <button class="btn">طباعه</button> 
        }
        </div>
    </div>

    <button [routerLink]="'/hr/employees/explorer'"  class="btn btn-primary" style="width:245px !important;">مستكشف  الموظفين </button>

   </div>
    
</div>

</div>

    <div class=" flex-1 grid grid-col-1 md:grid-cols-15 gap-[24px] gap-y-[20px]">
        <div class="col-span-3">
            <label for="jopNum" >الرقم الوظيفي</label>
            <input type="text" id="JobNum" placeholder="الرقم الوظيفي" formControlName="employeeNumber" maxlength="50" appOnlyNumber>
            <app-form-error [control]="employeeForm.controls['employeeNumber']" [errorKey]="'required'" [message]="'الرقم الوظيفي مطلوب'"></app-form-error>
        </div>
        <div class="col-span-4">
            <label for="baseNum" >الرقم الاساسي</label>
            <input type="text" id="baseNum" placeholder="الرقم الاساسي" formControlName="baseNember" maxlength="50" appOnlyNumber>
            <app-form-error [control]="employeeForm.controls['baseNember']" [errorKey]="'required'" [message]="'الرقم الاساسي مطلوب'"></app-form-error>
        </div>
        <div class="col-span-4">
            <label for="badal" >البدلات</label>
            <!-- <input type="text" id="badal" placeholder="البدلات"> -->
             <ng-select [items]="AllowancesList" [bindLabel]="'name'" [bindValue]="'id'" [placeholder]="'أختر'" multiple formControlName="allowancesIds"></ng-select>
             <app-form-error [control]="employeeForm.controls['allowancesIds']" [errorKey]="'required'" [message]="'البدلات مطلوبة'"></app-form-error>
        </div>
        <div class="col-span-4">
            <label for="salary" >الراتب</label>
            <input type="text" id="salary" placeholder="الرواتب" formControlName="salary" appOnlyNumber maxlength="50">
            <app-form-error [control]="employeeForm.controls['salary']" [errorKey]="'required'" [message]="'الرواتب مطلوب'"></app-form-error>
        </div>

        <div class="col-span-3">
             <label for="section" >القسم</label>
           <ng-select [items]="sectionsData" [bindLabel]="'name'" [bindValue]="'id'" [placeholder]="'أختر'"
              [loading]="loading"
             (scrollToEnd)="loadMoreSections()"
             formControlName="departmentId"
           ></ng-select>
           <app-form-error [control]="employeeForm.controls['departmentId']" [errorKey]="'required'" [message]="'القسم مطلوب'"></app-form-error>
        </div>
        <div class="col-span-4">
             <label for="arabicName" >الأسم العربي</label>
            <input type="text" name="arabicName" id="arabicName" placeholder="الأسم" formControlName="nameAr" maxlength="200">
            <app-form-error [control]="employeeForm.controls['nameAr']" [errorKey]="'required'" [message]="'الأسم  مطلوب'"></app-form-error>
            <app-form-error [control]="employeeForm.controls['nameAr']" [errorKey]="'minlength'" [message]="'الأسم  يجب ان يكون  2 حرف علي الأقل'"></app-form-error>
            <app-form-error [control]="employeeForm.controls['nameAr']" [errorKey]="'maxlength'" [message]="'اسم المشروع يجب ان يكون اقل من 200 حرف'"></app-form-error>
            <!-- <app-form-error [control]="employeeForm.controls['nameAr']" [errorKey]="'pattern'" [message]="'اسم المشروع يجب ان يكون حروف فقط'"></app-form-error> -->
              <app-form-error [control]="employeeForm.controls['nameAr']" [errorKey]="'invalidEntityName'" [message]="'اسم المشروع يجب ان يحتوي على حروف وارقام و _ و - فقط'"></app-form-error>
        </div>
        <div class="col-span-4">
             <label for="englishName" >english name</label>
            <input type="text" name="arabicName" id="englishName" placeholder="english name" formControlName="nameEn">

                <app-form-error [control]="employeeForm.controls['nameEn']" [errorKey]="'required'" [message]="'الأسم  مطلوب'"></app-form-error>
            <app-form-error [control]="employeeForm.controls['nameEn']" [errorKey]="'minlength'" [message]="'الأسم  يجب ان يكون  2 حرف علي الأقل'"></app-form-error>
            <app-form-error [control]="employeeForm.controls['nameEn']" [errorKey]="'maxlength'" [message]="'اسم المشروع يجب ان يكون اقل من 200 حرف'"></app-form-error>
            <!-- <app-form-error [control]="employeeForm.controls['nameEn']" [errorKey]="'pattern'" [message]="'اسم المشروع يجب ان يكون حروف فقط'"></app-form-error> -->
              <app-form-error [control]="employeeForm.controls['nameEn']" [errorKey]="'invalidEntityName'" [message]="'اسم المشروع يجب ان يحتوي على حروف وارقام و _ و - فقط'"></app-form-error>
        </div>
            <div class="col-span-4">
             <label for="phoneNumber" >رقم الجوال</label>
            <!-- <input type="text" name="phoneNumber" id="phoneNumber" placeholder="رقم الجوال"> -->
             <intl-tel-input
  #phoneInput
  [countryOrder]="['eg','sa','ae']"
  [onlyCountries]="['eg','sa','ae']"
  initialCountry="sa"
  [loadUtils]="loadUtils"
  formControlName="phoneNember"
  >
</intl-tel-input>
<app-form-error [control]="employeeForm.controls['phoneNember']" [errorKey]="'required'" [message]="'رقم الجوال مطلوب'"></app-form-error>
<app-form-error [control]="employeeForm.controls['phoneNember']" [errorKey]="'invalidSaudiPhone'" [message]="'رقم الجوال السعودي غير صحيح'"></app-form-error>
<app-form-error [control]="employeeForm.controls['phoneNember']" [errorKey]="'invalidEgyptPhone'" [message]="'رقم الجوال المصري غير صحيح'"></app-form-error>
        </div>
         
    </div>

  </div>


</form>
<form class="box_header mb-7" [formGroup]="formAttachment" [formGroup]="employeeForm">
  <div class="title"> بيانات اضافيه </div>



  <div class="grid grid-cols-1 lg:grid-cols-16 gap-[24px] my-[8px] mb-[20px]">


       

    <div class="col-span-12 md:col-span-4">
        <label for="idNumber" >رقم الهويه / الاقامه</label>
        <input type="text" id="idNumber" placeholder="رقم الهويه / الاقامه"  formControlName="nationalIdOrIqamaNumber" appOnlyNumber maxlength="14">
        <app-form-error [control]="employeeForm.controls['nationalIdOrIqamaNumber']" [errorKey]="'required'" [message]="'رقم الهويه / الاقامه مطلوب'"></app-form-error>
        <app-form-error [control]="employeeForm.controls['nationalIdOrIqamaNumber']" [errorKey]="'minlength'" [message]="'رقم الهويه يجب ان يكون من 10 الي 14 رقم'"></app-form-error>
    </div>
    <div class="col-span-12 md:col-span-4">
      <app-input-attachment [label]="'مرفق الهويه / الاقامه'"
      formControlName="nationalIdOrIqamaNumberFile"
      ></app-input-attachment>
    </div>
     <div class="col-span-12 md:col-span-4">
            <label for="addDate" >التاريخ</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'التاريخ'" [showIcon]="true" inputId="addDate" formControlName="medicalInsuranceDate" />
            <app-form-error [control]="employeeForm.controls['medicalInsuranceDate']" [errorKey]="'required'" [message]="'التاريخ مطلوب'"></app-form-error>
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>
         <div class="col-span-12 md:col-span-4">
      <app-input-attachment [label]="'مرفق التامين الطبي'"
      formControlName="medicalInsuranceFile"
    
      ></app-input-attachment>
    </div>
    <div class="col-span-12 md:col-span-4">
        <label for="document" >رقم الصرافه</label>
        <input type="text" id="document" numMar placeholder="رقم الصرافه" formControlName="iban" appOnlyNumber maxlength="24">
        <app-form-error [control]="employeeForm.controls['iban']" [errorKey]="'required'" [message]="'رقم الصرافه مطلوب'"></app-form-error>
    </div>
    
      <div class="col-span-12 md:col-span-4">
      <app-input-attachment [label]="'مرفق الصرافه'"
      formControlName="bankAttachmentFile"
    
      ></app-input-attachment>
    </div>

     <div class="col-span-12 md:col-span-4">
        <label for="numMar" >رقم الجواز</label>
        <input type="text" id="numMar" placeholder="رقم الجواز" formControlName="passportNumber" appOnlyNumber maxlength="14">
        <app-form-error [control]="employeeForm.controls['passportNumber']" [errorKey]="'required'" [message]="'رقم الجواز مطلوب'"></app-form-error>
    </div>

      <div class="col-span-12 md:col-span-4">
      <app-input-attachment [label]="'مرفق الجواز'"
        formControlName="passportNumber"
      ></app-input-attachment>
    </div>

    <div class="col-span-12 md:col-span-4">
        <label for="numBor" >رقم الحدود</label>
        <input type="text" id="numBor" placeholder="رقم الحدود" formControlName="borderNumber" appOnlyNumber maxlength="14">
        <app-form-error [control]="employeeForm.controls['borderNumber']" [errorKey]="'required'" [message]="'رقم الحدود مطلوب'"></app-form-error>
    </div>

      <div class="col-span-12 md:col-span-4">
      <app-input-attachment [label]="'مرفق الحدود'"
        formControlName="borderAttachment"
      ></app-input-attachment>
    </div>

    
    <div class="col-span-12 md:col-span-4">
        <label for="Nationality" >الجنسية</label>
        <input type="text" id="Nationality" placeholder="الجنسية"
        formControlName="nationality"         
        >
        <app-form-error [control]="employeeForm.controls['nationality']" [errorKey]="'required'" [message]="'الجنسية مطلوب'"></app-form-error>
    </div>
    <div class="col-span-12 md:col-span-4">
        <label for="work" >المهنه</label>
        <input type="text" id="work" placeholder="المهنه" formControlName="jobTitle">
        <app-form-error [control]="employeeForm.controls['jobTitle']" [errorKey]="'required'" [message]="'المهنه مطلوب'"></app-form-error>
    </div>

      <div class="col-span-12 md:col-span-4">
            <label for="Birth" >تاريخ الميلاد</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'تاريخ الميلاد'" [showIcon]="true" inputId="Birth" formControlName="dateOfBirth" />
            <app-form-error [control]="employeeForm.controls['dateOfBirth']" [errorKey]="'required'" [message]="'تاريخ الميلاد مطلوب'"> </app-form-error>
            
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>

      <div class="col-span-12 md:col-span-4">
            <label for="live" >تاريخ مباشره العمل</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'تاريخ مباشره العمل'" [showIcon]="true" inputId="live" formControlName="workStartDate" />
            <app-form-error [control]="employeeForm.controls['workStartDate']" [errorKey]="'required'" [message]="'تاريخ مباشره العمل مطلوب'"></app-form-error>
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>

      <div class="col-span-12 md:col-span-4">
            <label for="Replay" >تاريخ العوده من الاجازه</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'تاريخ العوده من الاجازه'" [showIcon]="true" inputId="Replay"  formControlName="returnFromLeaveDate"/>
            <app-form-error [control]="employeeForm.controls['returnFromLeaveDate']" [errorKey]="'required'" [message]="'تاريخ العوده من الاجازه مطلوب'"></app-form-error>
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>

      <div class="col-span-12 md:col-span-4">
            <label for="endContract" >تاريخ إنهاء العقد</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'تاريخ إنهاء العقد'" [showIcon]="true" inputId="endContract" formControlName="contractEndDate"/>
            <app-form-error [control]="employeeForm.controls['contractEndDate']" [errorKey]="'required'" [message]="'تاريخ إنهاء العقد مطلوب'"></app-form-error>
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>

        
            <div class="col-span-12 md:col-span-4">
      <app-input-attachment [label]="'مرفق انهاء العقد'"
      formControlName="contractEndAttachmentFile"
      ></app-input-attachment>
    </div>
        <div class="col-span-12 md:col-span-12">
        <label for="address" >العنوان</label>
        <input type="text" id="address" placeholder="العنوان" formControlName="address">
        <app-form-error [control]="employeeForm.controls['address']" [errorKey]="'required'" [message]="'العنوان مطلوب'"></app-form-error>
        <app-form-error [control]="employeeForm.controls['address']" [errorKey]="'minlength'" [message]="'العنوان يجب ان يكون على الاقل 3 حروف'"></app-form-error>
    </div>





  
  

      

  

  </div>
