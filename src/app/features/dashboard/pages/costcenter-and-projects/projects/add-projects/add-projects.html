<div class="flex justify-between flex-wrap mb-[25px] sticky top-[60px] pt-[10px] mt-[10px] bg-[var(--color-bg)] z-1">
    <div>
        
        <h2 class="text-[var(--color-primary)] text-[20px] font-[700]">المشاريع</h2>
      <div class="flex items-center flex-wrap gap-5 my-4
      [&>*]:w-[104px]  [&>*]:h-[32px]  
      ">
          <button (click)="save()" class="btn " [ngClass]="{'btn-primary':!isEditMode,'btn-warning':isEditMode}">
            {{isEditMode?'تعديل':'حفظ'}}
          </button>
          <button (click)="reset()" class="btn">جديد</button>
         @if(isEditMode){
           <button (click)="delete()" class="btn">حذف</button>
          <button (click)="print()" class="btn">طباعه</button>
         }
        </div>
    </div>

   <div class="explorer_button">
    <button [routerLink]="'/costcenter-and-projects/projects/explorer'"  class="btn btn-primary" style="width:245px !important;">مستكشف المشاريع </button>

   </div>
    
</div>

    <div class="col-span-12 md:col-span-6">
        <label for="reference">رقم المرجع</label>
        <input type="text" id="reference" formControlName="referenceNumber" placeholder="رقم المرجع" maxlength="50" >
        <app-form-error [control]="projectForm.controls['referenceNumber']" [errorKey]="'required'" [message]="'رقم المرجع مطلوب'"></app-form-error>
        <app-form-error [control]="projectForm.controls['referenceNumber']" [errorKey]="'maxlength'" [message]="'رقم المرجع يجب ان يكون اقل من 50 حرف'"></app-form-error>
    </div>
    
        <div class="col-span-12 md:col-span-6">
            <label for="addDate" >التاريخ</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'التاريخ'" [showIcon]="true" inputId="addDate" formControlName="date" />
            <app-form-error [control]="projectForm.controls['date']" [errorKey]="'required'" [message]="'التاريخ مطلوب'"> </app-form-error>
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>
        
          <div class="col-span-12 md:col-span-3">
            <label for="document" >اسم المشروع</label>
            <input type="text" id="document" placeholder="اسم المشروع" formControlName="nameAr" maxlength="200">
            <app-form-error [control]="projectForm.controls['nameAr']" [errorKey]="'required'" [message]="'اسم المشروع مطلوب'"></app-form-error>
            <app-form-error [control]="projectForm.controls['nameAr']" [errorKey]="'minlength'" [message]="'اسم المشروع يجب ان يتكون من حرفين او أكثر'"></app-form-error>
            <app-form-error [control]="projectForm.controls['nameAr']" [errorKey]="'maxlength'" [message]="'اسم المشروع يجب ان يكون اقل من 200 حرف'"></app-form-error>
            <!-- <app-form-error [control]="projectForm.controls['nameAr']" [errorKey]="'pattern'" [message]="'اسم المشروع يجب ان يكون حروف فقط'"></app-form-error> -->
              <app-form-error [control]="projectForm.controls['nameAr']" [errorKey]="'invalidEntityName'" [message]="'اسم المشروع يجب ان يحتوي على حروف وارقام و _ و - فقط'"></app-form-error>
        </div>
        <div class="col-span-12 md:col-span-3">
          <label for="document" >مركز التكلفه</label>
         <ng-select [items]="constCenterList" [bindLabel]="'nameAr'" [bindValue]="'id'" [multiple]="true" [placeholder]="'مركز التكلفه'" formControlName="costCenterIds"></ng-select>
         <app-form-error [control]="projectForm.controls['costCenterIds']" [errorKey]="'required'" [message]="'مركز التكلفه مطلوب'"></app-form-error>
      </div>
      
        <div class="col-span-12 md:col-span-3">
            <label for="addDate" >تاريخ البداية</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'التاريخ'" [showIcon]="true" inputId="addDate" formControlName="startDate" />
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
             <app-form-error [control]="projectForm.controls['startDate']" [errorKey]="'required'" [message]="'تاريخ البداية مطلوب'"></app-form-error>
        </div>
        <div class="col-span-12 md:col-span-3">
            <label for="endDate" >تاريخ النهاية</label>
            <p-datepicker  [iconDisplay]="'input'" [placeholder]="'التاريخ'" [showIcon]="true" inputId="endDate" formControlName="endDate" />
            <app-form-error [control]="projectForm.controls['endDate']" [errorKey]="'required'" [message]="'تاريخ النهاية مطلوب'"></app-form-error>
            <!-- <input type="text" id="document" placeholder="التاريخ" placeholder="0.00"> -->
        </div>
  
    <div class="col-span-12 md:col-span-3">
        <label for="value" >قيمة المشروع</label>
        <input type="text" id="value" placeholder="00.00"   formControlName="projectValue" appOnlyNumber maxlength="10">
        <app-form-error [control]="projectForm.controls['projectValue']" [errorKey]="'required'" [message]="'قيمة المشروع مطلوب'"></app-form-error>

    </div>
    <div class="col-span-12 md:col-span-3">
        <label for="tax" >ضريبه المشروع</label>
        <input type="text" id="tax" placeholder="00.00" appMaxPercentage formControlName="projectTax"  maxlength="10">
        <app-form-error [control]="projectForm.controls['projectTax']" [errorKey]="'required'" [message]="'ضريبه المشروع مطلوب'"></app-form-error>

    </div>
    <div class="col-span-12 md:col-span-3">
        <label for="tamen" >قيمه التامين</label>
        <div class="relative"> 
            <input type="text"  id="tamen" placeholder="القيمه" style="padding-left:50px;" maxlength="10" formControlName="insuranceValue" appOnlyNumber>
            <app-form-error [control]="projectForm.controls['insuranceValue']" [errorKey]="'required'" [message]="'قيمه التامين مطلوب'"></app-form-error>
            <!-- <button type="button" (click)="popupAddValue()" class="absolute left-0 bg-[var(--color-btn)] text-[var(--color-text-btn)]  w-[53px] h-[32px]"
            style="border-radius:4px 0px 0px 4px;"
            >استلام</button> -->
        </div>

    </div>
    <div class="col-span-12 md:col-span-3">
        <label for="percentage" >نسبة التامين</label> 
        <div class="relative">
            <input type="text" id="percentage" placeholder="النسبة" appMaxPercentage style="padding-left:50px;" maxlength="10" formControlName="insurancePercentage" appOnlyNumber >
            <app-form-error [control]="projectForm.controls['insurancePercentage']" [errorKey]="'required'" [message]="'نسبة التامين مطلوب'"></app-form-error>
        </div>

    </div>
    <div class="col-span-12 md:col-span-6">
        <label for="total" >مرفقات مواصفات فنيه</label>
        <div class="relative">
            <input type="text" id="total" [placeholder]="selectedFiles.length > 0 ? 'يوجد ' + selectedFiles.length  + ' مرفق' : 'مرفقات مواصفات فنيه'" readonly >
            <div>
            @if(selectedFiles.length > 0){
                <div class="eye absolute left-[36px] top-[6px] text-[14px] text-btn" (click)="showPopupPreview()">
                <i class="fa-regular fa-eye"></i>
              </div>
              <div class="eye absolute left-[30px] top-[5px] text-[14px] text-gray-400">
               |
              </div>
            }
              <div >
