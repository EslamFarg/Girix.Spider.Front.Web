<div class="flex justify-between flex-wrap mb-[25px] sticky top-[60px] pt-[10px] mt-[10px] bg-[var(--color-bg)] z-1">
  <div>
    <h2 class="text-[var(--color-primary)] text-[20px] font-[700]">المستخدمين والصلاحيات</h2>
    <div class="flex items-center flex-wrap gap-5 my-4 [&>*]:w-[104px] [&>*]:h-[32px]">
      <button class="btn" [ngClass]="buttonClass" (click)="save()">{{ buttonLabel }}</button>
      <button class="btn" (click)="reset()">جديد</button>
      @if (idUpdate > 0) {
        <button class="btn" (click)="delete()">حذف</button>
        <button class="btn" (click)="print()">طباعه</button>
      }
    </div>
  </div>

  <div class="explorer_button">
    <button [routerLink]="'/users-and-permissions/users-and-permissions/explorer'" class="btn btn-primary" style="width:245px !important;">
      مستكشف الصلاحيات
    </button>
  </div>
</div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-[24px] mb-[20px] mt-[5px]">
    <div class="lg:col-span-12 col-span-12">
      <label for="groupName">اسم المجموعة</label>
      <input type="text" placeholder="اسم المجموعة" id="groupName" formControlName="name" maxlength="100" class="w-full" />
      <app-form-error
        [control]="groupForm.controls['name']"
        [errorKey]="'required'"
        [message]="'اسم المجموعة مطلوب'"
      ></app-form-error>
      <app-form-error
        [control]="groupForm.controls['name']"
        [errorKey]="'minlength'"
        [message]="'اسم المجموعة يجب ان يتكون من 2 حرف او أكثر'"
      ></app-form-error>
      <app-form-error
        [control]="groupForm.controls['name']"
        [errorKey]="'maxlength'"
        [message]="'اسم المجموعة يجب ان يكون اقل من 100 حرف'"
      ></app-form-error>
      <app-form-error
        [control]="groupForm.controls['name']"
        [errorKey]="'invalidUsername'"
        [message]="'اسم المجموعة يجب ان يحتوي علي حروف وارقام و _ ويجب ان لا يبدأ برقم'"
      ></app-form-error>
    </div>

    <div class="col-span-12 md:col-span-6">
      <label for="branch">الفرع</label>
      <ng-select
        id="branch"
        [items]="branchesList"
        bindLabel="name"
        bindValue="id"
        [loading]="branchesLoading"
        formControlName="branchId"
        placeholder="الفرع الرئيسي">
      </ng-select>
      <app-form-error
        [control]="groupForm.controls['branchId']"
        [errorKey]="'required'"
        [message]="'الفرع مطلوب'"
      ></app-form-error>
    </div>

    <div class="col-span-12 md:col-span-6">
      <label for="salePriceType">تحديد سعر البيع</label>
      <ng-select
        id="salePriceType"
        [items]="salePriceTypes"
        bindLabel="name"
        bindValue="id"
        formControlName="salePriceType"
        placeholder="تحديد سعر البيع">
      </ng-select>
      <app-form-error
        [control]="groupForm.controls['salePriceType']"
        [errorKey]="'required'"
        [message]="'تحديد سعر البيع مطلوب'"
      ></app-form-error>
    </div>

    <div class="col-span-12 md:col-span-4">
      <div class="flex items-center gap-[10px]">
        <input type="checkbox" id="showWholesalePrice" formControlName="showWholesalePrice" />
        <label for="showWholesalePrice" style="margin-bottom: 0px !important;">إظهار سعر بيع جمله</label>
      </div>
      <div class="flex items-center gap-[10px] mt-5">
        <input type="checkbox" id="showProfitPrice" formControlName="showProfitPrice" />
        <label for="showProfitPrice" style="margin-bottom: 0px !important;">إظهار سعر الربح</label>
      </div>
    </div>

    <div class="col-span-12 md:col-span-4">
      <div class="flex items-center gap-[10px]">
        <input type="checkbox" id="showSuperWholesalePrice" formControlName="showSuperWholesalePrice" />
        <label for="showSuperWholesalePrice" style="margin-bottom: 0px !important;">إظهار سعر بيع جمله الجمله</label>
      </div>
      <div class="flex items-center gap-[10px] mt-5">
        <input type="checkbox" id="showAverageCostPrice" formControlName="showAverageCostPrice" />
        <label for="showAverageCostPrice" style="margin-bottom: 0px !important;">إظهار سعر متوسط التكلفه</label>
      </div>
    </div>

    <div class="col-span-12 md:col-span-4">
      <div class="flex items-center gap-[10px]">
        <input type="checkbox" id="showPurchasePrice" formControlName="showPurchasePrice" />
        <label for="showPurchasePrice" style="margin-bottom: 0px !important;">إظهار سعر بيع شراء</label>
      </div>
      <div class="flex items-center gap-[10px] mt-5">
        <input type="checkbox" id="allowSellingBelowAvailable" formControlName="allowSellingBelowAvailable" />
        <label for="allowSellingBelowAvailable" style="margin-bottom: 0px !important;">البيع بكميه اقل من المتاح</label>
      </div>
    </div>
  </div>
</form>

<app-shared-confirm-dialog
  [show]="showDeleteDialog"
  [title]="'حذف المجموعة'"
  [message]="'هل أنت متأكد من حذف هذه المجموعة؟ لا يمكن التراجع عن هذا الإجراء.'"
  (confirm)="deleteDialog()"
  (cancel)="showDeleteDialog = false"
></app-shared-confirm-dialog>
