
<h2 class="my-5 text-[var(--color-primary)] text-[20px] font-[700]">الحسابات</h2>
<div class="grid grid-cols-1 md:grid-cols-12 gap-4">

    <div class="col-span-12 mb-3">
      


        <div class="search_input relative w-[100%] ">
           <p-autocomplete styleClass="w-full"  [inputId]="'searchByCodeProduct'" [suggestions]="items" (completeMethod)="search($event)" [placeholder]="selectedSearch"/>
        
                    <div class="search_box absolute top-[40px] left-0 z-[20]
                    shadow-[0px_0px_4px_0px_rgba(0,0,0,0.25)]
                    bg-[var(--color-white)] w-[200px]  min-h-[32px] rounded-[4px]
                    p-2
                    [&>*]:p-2
                    [&>*]:hover:bg-[var(--color-primary)]
                    [&>*]:hover:text-[var(--color-white)]
                    [&>*]:not-last:mb-3
                    [&>*]:text-[14px]
                    [&>*]:rounded-[4px]
                    [&>*]:cursor-pointer
                    transition-all duration-200
                    cursor-pointer

                    " 
                    [ngClass]="{'translate-y-[-20px] opacity-0 invisible':!this.showSearchBox,'opacity-100 visible':this.showSearchBox}"
                    
                    >
                      <p (click)="selectFilterSearch('number')">رقم الحساب</p>
                      <p (click)="selectFilterSearch('name')">اسم الحساب</p>
                    </div>
        <!-- <input type="text" class="text-[14px] w-[100%]"  placeholder="بحث" style="color:var(--color-black); font-weight:600; width:100%"/> -->
        <div class="search_btns flex items-center gap-[10px] absolute left-[10px] top-[7px]" >
        
          <button (click)="showSearchBox = !showSearchBox">

            <rect width="1" height="18" fill="#BFD3E0" />

          <button>

    <div class="col-span-12 lg:col-span-6">
      <form  [formGroup]="accountsForm" (ngSubmit)="onSubmit()">
        <div class="flex items-center flex-wrap gap-3">
            <button class="btn btn-primary" type="submit" [ngClass]="ButtonClass">{{ButtonLabel}}</button>
            <button class="btn " type="button" (click)="resetForm()">جديد</button>
            @if(isEditMode){

              <button class="btn " type="button" (click)="showPopupDelete()">حذف</button>
              <!-- <button class="btn " type="button" (click)="openPdf()">طباعة</button> -->
              
            }

        </div>

        <div class="box_header mt-7 py-3">
             <div class="title">الحساب الرئيسي</div>
             <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                 <div class="col-span-12 md:col-span-6">
        <label for="numberParent">رقم حساب الأب</label>
        <input type="text" id="numberParent" placeholder="رقم حساب الأب" [value]="selectedAccountParent" readonly style="user-select: none; pointer-events: none;">
      
    </div>
                 <div class="col-span-12 md:col-span-6 ">
        <label for="document" (click)="nameAccountParent.focus()">اسم حساب الأب</label>
        <ng-select [items]="parentsList" #nameAccountParent [bindLabel]="'name'"  (clear)="onClearParent()"
  [clearable]="true" (change)="onSelectParent($event)" [bindValue]="'id'" formControlName="parentId" [placeholder]="'اسم حساب الأب'"></ng-select>
    <app-form-error [control]="accountsForm.controls['parentId']" [errorKey]="'required'" [message]="'اسم حساب الأب مطلوب'"></app-form-error>
    </div>
             </div>

        </div>
        

        <div class="box_header mt-7 py-3">
             <div class="title">الحساب الفرعي</div>
             <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                 <div class="col-span-12 md:col-span-4 relative">
        <label  >رقم حساب الابن</label>
        <div class="refresh_input relative">
            <input type="text" id="numberChild" placeholder="رقم " formControlName="code" readonly style="user-select: none; pointer-events: none;">
            <div class="icon" (click)="generateCode()">
                <i class="fa-solid fa-arrow-rotate-right"></i>
            </div>
            
          </div>
          <app-form-error [control]="accountsForm.controls['code']" [errorKey]="'required'" [message]="'رقم حساب الأبن مطلوب'"></app-form-error>
    </div>
                 <div class="col-span-12 md:col-span-8 ">
        <label for="nameAccountChild" >اسم الحساب </label>
        <input type="text" id="nameAccountChild" placeholder="الأسم" maxlength="100" formControlName="nameAr">
        <app-form-error [control]="accountsForm.controls['nameAr']" [errorKey]="'required'" [message]="'اسم الحساب مطلوب'"></app-form-error>
        <app-form-error [control]="accountsForm.controls['nameAr']" [errorKey]="'minlength'" [message]="'اسم الحساب يجب اكبر من 2 حرف'"></app-form-error>
        <app-form-error [control]="accountsForm.controls['nameAr']" [errorKey]="'maxlength'" [message]="'اسم الحساب يجب اقل من 100 حرف'"></app-form-error>
        
    </div>
                 <div class="col-span-12 md:col-span-4 ">
        <label (click)="branchData.focus()" >الفرع</label>
        <ng-select [items]="branchDataList" #branchData [bindLabel]="'name'" [bindValue]="'id'" [placeholder]="'الفرع'" formControlName="branchId"></ng-select>

        <app-form-error [control]="accountsForm.controls['branchId']" [errorKey]="'required'" [message]="'الفرع مطلوب'"></app-form-error>
    </div>
                 <div class="col-span-12 md:col-span-4 ">
        <label for="document" (click)="accountGroupData.focus()">مجموعه الحساب</label>
        <ng-select [items]="accountGroup" [bindLabel]="'name'" #accountGroupData [bindValue]="'id'"  formControlName="accountGroup" [placeholder]="'مجموعه الحساب'"></ng-select>
        <app-form-error [control]="accountsForm.controls['accountGroup']" [errorKey]="'required'" [message]="'مجموعه الحساب مطلوب'"></app-form-error>
    </div>
                 <div class="col-span-12 md:col-span-4 ">
        <label for="document" (click)="accountStatusInp.focus()">حاله الحساب</label>
        <ng-select [items]="accountStatus" #accountStatusInp [bindLabel]="'name'" [bindValue]="'id'" formControlName="accountStatus" [placeholder]="'حاله الحساب'"></ng-select>
        <app-form-error [control]="accountsForm.controls['accountStatus']" [errorKey]="'required'" [message]="'حاله الحساب مطلوب'"></app-form-error>
    </div>
                 <div class="col-span-12 md:col-span-6 ">
        <label for="document" (click)="accountNatural.focus()">طبيعه الحساب</label>
        <ng-select [items]="accountNature" #accountNatural [bindLabel]="'name'" [bindValue]="'id'" formControlName="accountNature" [placeholder]="'طبيعه الحساب'"></ng-select>
        <app-form-error [control]="accountsForm.controls['accountNature']" [errorKey]="'required'" [message]="'طبيعه الحساب مطلوب'"></app-form-error>
    </div>
                 <div class="col-span-12 md:col-span-6 ">
        <label for="document" > الحساب الختامي</label>
        <ng-select [items]="closedType" [bindLabel]="'name'" [bindValue]="'id'" formControlName="closingType" [placeholder]="' الحساب الختامي'"></ng-select>
        <app-form-error [control]="accountsForm.controls['closingType']" [errorKey]="'required'" [message]="' الحساب الختامي مطلوب'"></app-form-error>
    </div>
                 <div class="col-span-12 md:col-span-6 ">
        <label for="phoneNumber" > رقم الجوال</label>
        <input type="text" id="phoneNumber" placeholder="رقم الجوال" appOnlyNumber maxlength="14"  formControlName="mobileNumber" >
        <app-form-error [control]="accountsForm.controls['mobileNumber']" [errorKey]="'required'" [message]="'رقم الجوال مطلوب'"></app-form-error>
<app-form-error
  [control]="accountsForm.controls['mobileNumber']"
  [errorKey]="'invalidEgyptPhone'"
  [message]="'رقم الجوال المصري غير صحيح'">
</app-form-error>

<app-form-error
  [control]="accountsForm.controls['mobileNumber']"
  [errorKey]="'invalidSaudiPhone'"
  [message]="'رقم الجوال السعودي غير صحيح'">
</app-form-error>

<app-form-error
  [control]="accountsForm.controls['mobileNumber']"
  [errorKey]="'invalidPhone'"
  [message]="'يجب إدخال رقم مصري أو سعودي صحيح'">
</app-form-error>
<!-- 
<app-form-error
  [control]="accountsForm.controls['mobileNumber']"
  errorKey="'invalidPhone'"
  message="رقم الجوال غير صحيح">
</app-form-error>

<app-form-error
  [control]="accountsForm.controls['mobileNumber']"
  errorKey="'invalidCountry'"
  message="الدولة غير مدعومة (مصر أو السعودية فقط)">
</app-form-error> -->
    </div>
                 <div class="col-span-12 md:col-span-6 ">
        <label for="faxNumber" > رقم الفاكس</label>
        <input type="text" id="faxNumber" placeholder="رقم الفاكس" formControlName="fax" maxlength="20">
        <app-form-error [control]="accountsForm.controls['fax']" [errorKey]="'required'" [message]="'رقم الفاكس مطلوب'"></app-form-error>
        <app-form-error [control]="accountsForm.controls['fax']" [errorKey]="'minlength'" [message]="'رقم الفاكس يجب ان يكون اكبر من 6 ارقام'"></app-form-error>
        <app-form-error [control]="accountsForm.controls['fax']" [errorKey]="'maxlength'" [message]="'رقم الفاكس يجب ان يكون اقل من 20 ارقام'"></app-form-error>
        <app-form-error [control]="accountsForm.controls['fax']" [errorKey]="'pattern'" [message]="'رقم الفاكس غير صحيح'"></app-form-error>
    </div>
                 <div class="col-span-12">
        <label for="description" > البيان</label>
        <textarea name="" id="description" placeholder="البيان" style="height: 89px !important;" formControlName="description"></textarea>
        <!-- <app-form-error [control]="accountsForm.controls['description']" [errorKey]="'required'" [message]="'البيان مطلوب'"></app-form-error> -->
        <app-form-error [control]="accountsForm.controls['description']" [errorKey]="'minlength'" [message]="'البيان يجب ان يكون اكبر من 2 حرف'"></app-form-error>
        <app-form-error [control]="accountsForm.controls['description']" [errorKey]="'maxlength'" [message]="'البيان يجب ان يكون اقل من 100 حرف'"></app-form-error>
    </div>





             </div>

        </div>
        

      </form>
    </div>
    <div class="col-span-12 lg:col-span-6 ">

        <div class="container_tree flex  justify-between p-8 bg-[var(--color-white)] sm:h-[50] lg:h-[87vh]  border-[1px] border-[var(--color-border)] rounded-lg    ">

            
 <div class="tree">
  @for (item of treeNode; track $index) {
    <app-tree-node [node]="item" [level]="0" (eventClicked)="getDataFromTreeById($event)"></app-tree-node>
  }
</div>


<div class="refresh cursor-pointer absolute left-[31px]" (click)="refreshTree()">

</div>



        </div>



    </div>

</div>
