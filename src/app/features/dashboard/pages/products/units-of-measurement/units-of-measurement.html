<h3 class="mt-[20px] text-[20px] font-[700] mb-1">وحدات القياس</h3>

<form class="grid grid-cols-1 md:grid-cols-12 gap-4" [formGroup]="unitForm" (ngSubmit)="onSubmit()">
    <div class="col-span-12">
        <label for="unitName">اسم الوحدة</label>
        <input type="text" placeholder="اسم الوحدة" appOnlyString formControlName="nameAr" id="unitName" maxlength="100">
        <app-form-error [control]="unitForm.controls['nameAr']" [errorKey]="'required'" [message]="'اسم الوحدة مطلوب'"></app-form-error>
        <app-form-error [control]="unitForm.controls['nameAr']" [errorKey]="'minlength'" [message]="'يجب ان يكون اسم الوحدة اكبر من 2 حرف'"></app-form-error>
        <app-form-error [control]="unitForm.controls['nameAr']" [errorKey]="'maxlength'" [message]="'يجب ان يكون ال اسم الوحدة اقل من 100 حرف'"></app-form-error>
      <!-- <form-error [control]="unitForm.controls['nameAr']" [hasError]='required' [message]="'اسم الوحدة مطلوب'"></form-error> -->
    </div>

    <div class="col-span-12 flex justify-end gap-5 mt-[15px]">
        <button class="btn" [ngClass]="buttonClass" type="submit" >{{buttonLabel}}</button>
        <button class="btn " type="reset" (click)="resetForm()">جديد</button>
    </div>
  </form>




<div class="table-responsive mt-9">
  <table class="w-full ">

    <thead class="bg-gray-100 ">
      <tr class="bg-[var(--color-primary)]">
      <td class="text-right" colspan="3">   <div class="search_input relative md:w-[30%]">
        <!-- <input type="text" class="text-[14px] w-[100%]"  placeholder="بحث" style="color:var(--color-black); font-weight:600; width:100%"/> -->
        <p-autocomplete
        #autoComplete
        (onFocus)="onFocusSearch($event)"
       (onClear)="clearSearch()"
        (onSelect)="onSelect($event)"
        class='autocomplete_full_width' [inputId]="'searchByCodeProduct'"  [suggestions]="items" (completeMethod)="search($event)" [placeholder]="selectedSearch"/>
        <div class="search_btns flex items-center gap-[10px] absolute left-[10px] top-[6px]" >
         

        
                  

          <button class="cursor-pointer" >
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M10.4193 17.5001C6.04702 17.5001 2.5026 13.9557 2.5026 9.58341C2.5026 5.21116 6.04702 1.66675 10.4193 1.66675C14.7915 1.66675 18.3359 5.21116 18.3359 9.58341C18.3359 13.9557 14.7915 17.5001 10.4193 17.5001Z"
                stroke="#7F7F7F"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M1.66927 18.3334L3.33594 16.6667"
                stroke="#7F7F7F"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div></td>
      <!-- <td></td> -->
      <!-- <td></td> -->
      
        
      </tr>
      <tr class="sticky top-0">
        <th class="p-2 text-center">م</th>
        <th class="p-2 text-center">الوحده</th>
        <th class="p-2 text-center">الادوات</th>
      </tr>
    </thead>
    <tbody>
  

        @for(item of unitOfMeasureList?.data?.rows;track $index){

            <tr >
            <td class="p-2 text-center">{{ $index + 1 }}</td>
            <td class="p-2 text-center">{{ item?.name }}</td>
         <td class="p-2 w-full flex items-center justify-center gap-2">
          
            <button class="update" (click)="onEditData(item.id)">


<i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button class="delete" (click)="showPopupDelete(item.id)">

  <i class="fa-solid fa-trash"></i>

            </button>
        </td>
            </tr>

        }@empty {
  <tr>
    <td colspan="3" class="p-6 text-center">
      
      <div class="flex flex-col items-center justify-center gap-3 py-10">

        <!-- Icon -->
        <div class="w-14 h-14 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fa-solid fa-inbox text-gray-400 text-xl"></i>
        </div>

        <!-- Title -->
        <h3 class="text-gray-600 text-lg font-semibold">
          لا توجد بيانات
        </h3>

        <!-- Subtitle -->
        <p class="text-gray-400 text-sm">
          لم يتم إضافة أي وحدات قياس حتى الآن
        </p>

    

      </div>

    </td>
  </tr>
}



    </tbody>

  </table>
</div>

   <div class="card flex justify-center mt-4">
            <p-paginator (onPageChange)="onPageChange($event)" [showFirstLastIcon]="false" [first]="pageIndex" [rows]="pageSize" [totalRecords]="totalRecords" [rowsPerPageOptions]="[10, 25, 50,100,250]"/>
      </div>

<app-shared-confirm-dialog [show]="showDeleteDialog" [title]="'حذف الوحدة'" [message]="'هل أنت متأكد من حذف هذه الوحدة؟ لا يمكن التراجع عن هذا الإجراء.'" (confirm)="deleteUnitOfMeasurement()" (cancel)="showDeleteDialog=false"></app-shared-confirm-dialog>
