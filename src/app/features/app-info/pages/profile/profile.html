      <div class="grid md:grid-cols-2 gap-4 flex-1">
        <div>
          <label for="productName">اسم المستخدم</label>
          <app-input-error-message-handler>
            <input pInputText id="productName" aria-describedby="productName-help" placeholder="الاسم" />
          </app-input-error-message-handler>
        </div>
        <div class="flex flex-col justify-end">
          <label for="productName">رقم الجوال</label>
          <app-input-error-message-handler>
            <input pInputText id="productName" aria-describedby="productName-help" placeholder="الرقم" />
          </app-input-error-message-handler>
        </div>
        <div>
          <label for="productName">البريد الالكتروني</label>
          <app-input-error-message-handler>
            <input pInputText id="productName" aria-describedby="productName-help" placeholder="البريد الالكتروني" />
          </app-input-error-message-handler>
        </div>

        

        <div class="flex flex-col justify-end">
          <label for="productName">نوع المستخدم</label>
          <app-input-error-message-handler>
            <p-select [options]="[]" optionLabel="name" placeholder="النوع" class="w-full!" />
          </app-input-error-message-handler>
        </div>
      </div>

    <div class="flex justify-end mt-4 md:mt-6">
      <p-button
        class="flex-1 md:flex-none"
        styleClass="border-dark-line! bg-dark-line! text-white! py-1! w-full  md:px-8!"
        label="حفظ"
      />
