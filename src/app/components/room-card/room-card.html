<div
  class="room-card-surface flex border cursor-pointer border-[#393C49] aspect-[0.89] available items-center justify-center bg-white rounded"
  style="backdrop-filter: blur(20px); box-shadow: 0px 0px 20px 0px rgb(var(--color)) inset"
  [class]="roomStatusClass()"
>
  <span class="room-card-label text-black font-bold mx-auto w-[95%] text-center text-ellipsis overflow-hidden whitespace-nowrap">{{ data()?.name }}</span>
</div>
