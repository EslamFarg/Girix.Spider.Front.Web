<div
  class="flex gap-2 items-center w-full"
  [class.hidden]="!((items()?.length ?? 0) > 0)"
  style="--p-button-primary-background: transparent; --p-button-primary-color: #375652"
>
  <button (click)="scrollRight()" pButton class="border-0! nav-btn" type="button">
    <i class="pi pi-chevron-right"></i>
  </button>

  <div class="flex-1 overflow-hidden">
    <div class="flex items-center w-full h-fit overflow-auto no-scrollbar" #itemsContainer>
      @for (item of items(); track $index) {
        <div class="px-1" [style]="`width: ${config().itemWidth}px;min-width: ${config().itemWidth}px`">
          <ng-container *ngTemplateOutlet="template(); context: { $implicit: item }"></ng-container>
        </div>
      }
    </div>
  </div>

  <button (click)="scrollLeft()" pButton class="border-0! nav-btn" type="button">
    <i class="pi pi-chevron-left"></i>
  </button>
</div>
