<aside class=" flex flex-col justify-between p-4 h-full">
  <div class="flex flex-col  gap-2">
    <div class="flex items-center gap-2">
      <div class="bg-gray-500 p-2 rounded-full w-8 aspect-square flex items-center justify-center">
        <i class="pi pi-user"></i>
      </div>
      <div>
        <h1>Yousofo</h1>
        <p class="text-sm text-gray-400">Adminstrator</p>
      </div>
    </div>

    <p-panelmenu [model]="items" class="w-full md:w-60 mt-5">
      <ng-template #item let-item>
        <a [routerLink]="item.routerLink" pRipple class="flex items-center px-4 py-2 cursor-pointer group">
          @if (item.items) {
          <i class=" me-2 pi pi-chevron-right  text-primary group-hover:text-inherit" [class.rotate-90]="item.expanded"></i>
          }
          <i [class]="item.icon + ' text-primary group-hover:text-inherit'"></i>
          <span class="ml-2">
            {{ item.label }}
          </span>
          @if (item.badge) {
          <p-badge class="ml-auto" [value]="item.badge" />
          }
          @if (item.shortcut) {
          <span class="ml-auto border border-surface rounded
            bg-emphasis text-muted-color text-xs p-1">
            {{ item.shortcut }}
          </span>
          }

        </a>
      </ng-template>
    </p-panelmenu>
  </div>

  <div class="flex flex-col gap-4 mt-5 justify-self-end">
    <a href="" class="cursor-pointer flex items-center gap-2">
      <div class="bg-gray-500  rounded-full w-6  aspect-square flex items-center justify-center">
        <i class="pi pi-cog text-sm!"></i>
      </div>
      <span>Settings</span>
    </a>
    <a href="" class="cursor-pointer flex items-center gap-2">
      <div class="bg-gray-500  rounded-full w-6  aspect-square flex items-center justify-center">
        <i class="pi pi-question text-sm!"></i>
      </div>
      <span>Support</span>
    </a>
  </div>
</aside>
