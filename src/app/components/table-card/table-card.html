<div
  style="backdrop-filter: blur(20px); box-shadow: 0px 0px 20px 0px rgb(var(--color)) inset"
  [class]="
    'flex border cursor-pointer border-[#393C49] items-center justify-center bg-white rounded-full ' +
    tableStatusClass()
  "
>
  <span class="text-black font-bold mx-auto min-w-[95%] w-[95%] text-center text-ellipsis overflow-hidden whitespace-nowrap">{{data()?.name}}</span>
</div>
